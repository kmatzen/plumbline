# Depth Anything V2 (base) on the FULL DIODE-indoor val (325 imgs) — DA-V2 Table 2.
#
# Base-variant counterpart to da-v2-small-diode-indoor-full. DA-V2 Table 2's
# DIODE ViT-B = AbsRel 0.068 / δ₁ 0.950 (PDF-verified, ar5iv 2406.09414),
# indoor-conventional protocol (the same the rest of the site uses for DIODE).

name: da-v2-base-diode-indoor-full

model:
  name: depth-anything-v2
  kwargs:
    variant: base

dataset:
  name: diode
  split: val
  kwargs:
    domain: indoors

# DA-V2 predicts affine-invariant inverse depth (MiDaS-style disparity).
tasks:
  - mono_depth
scale_alignment: scale_shift
max_views: 1
device: cuda:0
depth_clip: [0.001, 50.0]

paper_reference:
  primary_metric: abs_rel
  value: 0.068
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 (zero-shot relative depth estimation), DIODE column, Depth-Anything-V2 ViT-B row: AbsRel = 0.068 (δ₁ = 0.950). Affine-invariant inverse depth (per table caption). DIODE indoor-conventional. PDF-verified ar5iv 2406.09414."
  source_confidence: verified_pdf

notes: >
  Full 325-img DIODE-indoor val, site-consistent DIODE protocol (cf.
  da-v2-small-diode-indoor-full 0.0720, unik3d-large-diode, moge-vitl-diode-indoor).
  Needs DIODE val at $DIODE_ROOT.
