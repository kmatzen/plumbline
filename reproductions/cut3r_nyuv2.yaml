# CUT3R single-frame depth on NYUv2 — CUT3R Table 1 paper target.
#
# Targets CUT3R Table 1 "Single-frame Depth Evaluation" (Wang et al.
# 2025, arXiv:2501.12387), NYU-v2 column, "Ours" row: Abs Rel = 0.086
# (companion δ<1.25 = 90.9). Verified by direct PDF read 2026-05-23
# (PDF page 5).
#
# Protocol (paper §4.1): zero-shot monocular depth on NYU-v2 (static),
# "per-frame median scaling per DUSt3R", metrics Abs Rel + δ<1.25.
# CUT3R is a recurrent multi-view model run here on a single frame
# (min_views=1).
#
# STATUS — D24 RESOLVED 2026-05-25 (protocol delta, NOT a model bug):
# The single-record diff this YAML was waiting on is now done (see D24 in
# docs/DISCREPANCIES.md). Re-scoring the SAME cached CUT3R preds shows
# plumbline's `nyu_eigen_2014` protocol (rawDepths + Eigen crop +
# clip[1e-3,10]) lands at 0.0522 — *better* than paper 0.086 — because it
# is STRICTER than the DUSt3R-lineage protocol the paper reports (dense/
# filled GT, no crop), which re-scores to 0.0777. plumbline's CUT3R
# predictions are correct. We keep the strict protocol on purpose, so this
# is a documented protocol delta: the harness reports `paper_match: no`,
# and that `no` is EXPECTED — not a suspect cell. See D24.

name: cut3r-nyuv2
protocol: nyu_eigen_2014

model:
  name: cut3r
  kwargs:
    size: 512

# Per-frame median scaling (paper §4.1, "per DUSt3R"). The nyu_eigen_2014
# protocol intentionally leaves scale_alignment to the reproduction.
scale_alignment: median
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.086
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, CUT3R (arXiv:2501.12387), Table 1 (Single-frame Depth Evaluation), NYU-v2 Abs Rel column, 'Ours' row = 0.086 (companion δ<1.25 = 90.9; protocol: per-frame median scaling per DUSt3R). Verified by direct PDF read 2026-05-23 (PDF page 5)."
  source_confidence: verified_pdf

notes: >
  First CUT3R reproduction — closes the video / unordered-collection
  coverage gap (CUT3R is recurrent + order-agnostic; this cell runs it
  on single frames). Needs $CUT3R_ROOT (github clone) + $CUT3R_CKPT
  (the 512-DPT weights) + $NYUV2_ROOT. Pinned to the paper value, but this
  is a documented PROTOCOL DELTA, not a paper-match (D24): under plumbline's
  strict raw+crop protocol the model scores better (0.0522) than the
  DUSt3R-lineage filled+no-crop paper number (0.086). Run for the strict
  number; do not expect a ≤5 % match.
