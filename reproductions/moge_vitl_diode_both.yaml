# MoGe-1 (ViT-L) on DIODE val — combined indoor + outdoor
#
# Targets MoGe Table 3 DIODE cell (AbsRel 0.0400, affine-invariant
# disparity row). Now reads from the HF bundle `Ruicheng/
# monocular-geometry-evaluation` via `DIODEMogeEvalLoader` — which
# matches MoGe's own eval preprocessing (log-encoded 16-bit depth.png
# with sky as +inf, isfinite-based mask, no spurious depth clip).
#
# Alignment is plain scale+shift LSQ in disparity space to match
# MoGe's `align_affine_lstsq` (no Huber, no MAD — plumbline's
# scale_shift_robust is strictly stronger than paper's solver and
# would overfit the number), PLUS MoGe's per-sample disparity floor at
# ``1/gt_depth.max()`` (`moge/test/metrics.py` ~line 210). The clamp
# bounds the aligned depth above by the largest valid GT depth per
# sample — on DIODE outdoor, where a handful of post-alignment
# outliers were producing 1e4-1e6 metre depths and blowing up mean
# AbsRel while the median was on paper (D19 in DISCREPANCIES.md).

name: moge-vitl-diode-both
protocol: diode_moge

model:
  name: moge
  kwargs:
    variant: vitl

dataset:
  name: diode-moge-eval
  kwargs:
    domain: both

scale_alignment: scale_shift_clamped
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3
  # (Depth Map Estimation), DIODE column, affine-invariant disparity
  # row, ViT-L: Reld = 4.00 → AbsRel 0.0400, δ₁ = 97.3. The paper's
  # eval is on the HF bundle (771 samples, combined val) with MoGe's
  # plain-LSQ align_affine_lstsq solver in disparity space — which
  # this YAML now mirrors.
  value: 0.0400
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 (Depth Map Est.), DIODE column (HF bundle 771 samples), affine-invariant disparity row, ViT-L."
  source_confidence: verified_pdf

notes: >
  Historical runs (plumbline pre-2026-04-21, ROE alignment against the
  raw DIODE devkit .npy depth with [1e-3, 50] m clip): AbsRel 0.1993
  on combined val. 188 % over paper. Root-caused to three simultaneous
  issues in the old DIODE loader:
      1. Raw .npy keeps sky as finite large values (>300 m); HF bundle
         recodes sky to +inf so `isfinite` is a clean sky mask.
      2. Plumbline's [1e-3, 50] m clip truncated legitimate outdoor
         returns, blowing up AbsRel. MoGe applies no such clip.
      3. Devkit enumeration is 612 samples; HF bundle is 771. Different
         populations — paper is on the 771.

  Staging the HF bundle:
      hf download Ruicheng/monocular-geometry-evaluation \
          DIODE.zip --repo-type dataset --local-dir <tmp>
      unzip <tmp>/DIODE.zip -d $DIODE_MOGE_ROOT

  Needs `pip install 'git+https://github.com/microsoft/MoGe.git'`.
