# VGGT ScanNet depth reproduction
#
# Target: reproduce the VGGT paper's ScanNet multi-view depth number
# (AbsRel) within a documented relative tolerance.
#
# Paper: "VGGT: Visual Geometry Grounded Transformer" (Wang et al. 2025).
# Table and exact sample list must match the paper supplement. The values
# below are PLACEHOLDERS — fill in when reproducing on the first real GPU
# run and pin the sample list in a static manifest file.

name: vggt-paper-scannet-depth

model:
  name: vggt
  kwargs:
    # Only one public VGGT checkpoint today: facebook/VGGT-1B (the Large).
    # If upstream ships additional sizes, add a ``variant`` kwarg and wire it
    # through VGGTAdapter.__init__ first.
    dtype: bfloat16

dataset:
  name: scannet
  split: test
  kwargs:
    frame_stride: 30
    views_per_sample: 8

tasks:
  - mvs_depth

# VGGT predicts metric depth, so no scale alignment — this is the whole
# point of testing it as the metric benchmark.
scale_alignment: none
max_views: 8
device: cuda:0

# OPTIONAL: pin a specific subset of scenes for exact reproduction.
# The paper's sample list should be materialized as
# reproductions/vggt_scannet_depth.samples.txt and referenced here.
# sample_manifest: vggt_scannet_depth.samples.txt

paper_reference:
  primary_metric: abs_rel
  value: 0.0  # TODO: fill in from VGGT paper Table (ScanNet row, AbsRel column).
  tolerance_relative: 0.05  # ±5% relative.
  citation: "Wang et al. 2025, VGGT, Table <N>. ScanNet test, 8 views."

notes: >
  This config is the canonical v0.1 gate. Until the first real GPU run lands
  the published value and confirms the tolerance, treat the AbsRel check as
  informational — see REPRODUCTIONS.md for the current status.
