# VGGT chamfer / F-score on ETH3D courtyard
#
# Exercises the point-cloud evaluation path end-to-end: VGGT produces a
# dense point map; the runner applies 7-DoF Umeyama similarity alignment
# (camera-centres → GT camera-centres) to fit the prediction into the
# ETH3D laser-scan frame; chamfer + F-score are computed against the
# scan_clean GT. This is the reproduction-YAML counterpart to the
# existing pose-only vggt_view_sweep_courtyard.py script.
#
# Courtyard only — single scene keeps the wall-clock tractable and
# matches the data slice the existing ETH3D sweep rows report. A full
# ETH3D chamfer benchmark across all scenes is a v0.2 follow-up.

name: vggt-eth3d-courtyard-chamfer

model:
  name: vggt
  kwargs:
    dtype: bfloat16

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard]
    views_per_sample: 8
    # scan_clean.ply is ~38M points per scene — chamfer against the full
    # cloud runs minutes per sample. Subsample to 100k for tractable
    # eval; the deterministic seed on the loader keeps the same subset
    # between runs.
    max_gt_points: 100000

tasks:
  - mvs_depth  # fires the chamfer + F-score path in the runner

# ICP 7-DoF similarity fit of the predicted point map to the GT laser
# scan — the alignment protocol VGGT / MASt3R / DUSt3R papers use
# when they report chamfer. Warm-started from camera-centres Umeyama,
# then iterated to the closest-point minimum with 10% outlier trim.
pointcloud_alignment: icp
max_views: 8
device: cuda:0
# Paper-protocol chamfer: discard predicted points farther than this
# distance from the GT cloud before averaging. MVS papers report
# chamfer on the inlier pool so a tiny fraction of far-outlier
# hallucinations can't dominate the mean. 0.5 m is generous for a
# courtyard-sized scene.
chamfer_outlier_distance: 0.5

paper_reference:
  primary_metric: chamfer
  # VGGT's paper Table 3 reports ETH3D accuracy/completeness/overall
  # distance across the full test set (not a single scene). A single-
  # scene courtyard number is not directly comparable to that table.
  # Informational only.
  tolerance_relative: 1.0
  citation: "Wang et al. 2025, VGGT, Table 3 (ETH3D) — single-scene courtyard reported here is informational."

notes: >
  CORRECTED ON 2026-04-19 — earlier commits (565230c, 001f3b8) made
  a unit-interpretation error on f_score/precision/recall output.
  Those values are reported in PERCENT (0.67 means 0.67%, not 67%).
  The ICP + masking numbers here are modest improvements over
  Umeyama, not paper-level:

      alignment         F@5cm   prec   recall   chamfer
      camera_centers    0.12%   0.09%  0.22%    7.71
      icp               0.67%   0.69%  0.82%    6.84
      icp + mask=0.5    1.13%   2.16%  0.82%    5.87   (this config)

  CORRECTED AGAIN ON 2026-04-20 — the "paper reports F-scores in the
  60-90% range" comparison that used to live here was fabricated.
  VGGT Table 3 does NOT report F-score on ETH3D; it reports Accuracy
  0.901, Completeness 0.518, Overall 0.709 — DISTANCE metrics in
  metres, lower-is-better, with ↓ arrows. The "60-90%" range came
  from a prior misremembering; it does not appear in the paper.

  Additionally, F@5cm is an indoor T&T-convention threshold. ETH3D
  outdoor scenes have paper-level mean distances ~0.5-1 m, so at a
  5 cm threshold, even paper-level output lands in the low single
  digits of percent. The numbers in the table above are technically
  correct under plumbline's per-window F@5cm protocol, but that
  protocol is not comparable to anything in the paper.

  The paper-protocol reproduction of this scene now lives in
  vggt-eth3d-multiscene-chamfer (aggregation: scene, Acc/Comp/Overall
  in metres, 1 cm voxel, merged across 8-view windows). courtyard
  under that protocol: Acc 1.310, Comp 0.521, Overall 0.915 —
  comparable to VGGT paper Table 3's full-split Overall 0.709.

  Kept this yaml as-is (per-window ICP chamfer + F@5cm) because:
    - it's useful as an A/B against da3-eth3d-courtyard-chamfer
      under the same protocol (both measure per-window behaviour)
    - it exercises the chamfer_outlier_distance path that the
      scene-merge yaml doesn't use
    - removing it would rewrite git history of prior learnings
