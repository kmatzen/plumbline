# VGGT chamfer / F-score on ETH3D courtyard
#
# Exercises the point-cloud evaluation path end-to-end: VGGT produces a
# dense point map; the runner applies 7-DoF Umeyama similarity alignment
# (camera-centres → GT camera-centres) to fit the prediction into the
# ETH3D laser-scan frame; chamfer + F-score are computed against the
# scan_clean GT. This is the reproduction-YAML counterpart to the
# existing pose-only vggt_view_sweep_courtyard.py script.
#
# Courtyard only — single scene keeps the wall-clock tractable and
# matches the data slice the existing ETH3D sweep rows report. A full
# ETH3D chamfer benchmark across all scenes is a v0.2 follow-up.

name: vggt-eth3d-courtyard-chamfer

model:
  name: vggt
  kwargs:
    dtype: bfloat16

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard]
    views_per_sample: 8
    # scan_clean.ply is ~38M points per scene — chamfer against the full
    # cloud runs minutes per sample. Subsample to 100k for tractable
    # eval; the deterministic seed on the loader keeps the same subset
    # between runs.
    max_gt_points: 100000

tasks:
  - mvs_depth  # fires the chamfer + F-score path in the runner

# Predicted camera centres fit to GT camera centres via Umeyama; the
# resulting 7-DoF similarity is then applied to the full dense point
# map before chamfer. Needs N >= 3 views — we use 8.
pointcloud_alignment: camera_centers
max_views: 8
device: cuda:0

paper_reference:
  primary_metric: chamfer
  # VGGT's paper Table 3 reports ETH3D accuracy/completeness/overall
  # distance across the full test set (not a single scene). A single-
  # scene courtyard number is not directly comparable to that table.
  # Informational only.
  tolerance_relative: 1.0
  citation: "Wang et al. 2025, VGGT, Table 3 (ETH3D) — single-scene courtyard reported here is informational."

notes: >
  First GPU run (RTX 3090 Ti, 2026-04-19, 31 sliding 8-view windows):
  chamfer=7.71, F-score@0.05=0.12%, precision=0.09%, recall=0.22%.
  These numbers are much worse than the VGGT paper's full-ETH3D
  table would suggest (paper Table 3 reports sub-0.1 scale on a
  different protocol). Most likely explanations — not yet
  investigated — in rough order of plausibility:

    1. Courtyard is a notoriously hard ETH3D scene (textured wall
       + ground, strong specular glass window frames). Single-scene
       chamfer can be 10-50x worse than the cross-scene mean.
    2. 8-view Umeyama on courtyard's near-collinear camera track may
       be numerically fragile, biasing the 7-DoF similarity fit.
       Paper tables use a DIFFERENT alignment protocol — possibly
       ICP on the point clouds themselves, not camera centres.
    3. VGGT's internal point-map scale is not metric; our fit
       recovers a 5.84x scale but the translation may be off.

  This YAML is the first infrastructure check that the chamfer
  path runs end-to-end. Accuracy calibration on a full-dataset
  protocol is v0.2 work. Do NOT cite these numbers against paper
  tables without re-doing the protocol.

  Perf note: requires the metrics/pointmap.py workers=-1 fix
  (commit 58bb74a); without it each sample takes ~3 min of chamfer
  and the 31-sample run is ~50 min instead of ~7 min.
