# CUT3R single-frame depth on KITTI — CUT3R Table 1 paper target.
#
# Targets CUT3R Table 1 "Single-frame Depth Evaluation" (Wang et al.
# 2025, arXiv:2501.12387), KITTI column, "Ours" row: Abs Rel = 0.092
# (companion δ<1.25 = 91.3). Verified by direct PDF read 2026-05-23
# (PDF page 5).
#
# Protocol (paper §4.1): zero-shot monocular depth on KITTI (dynamic,
# outdoor), "per-frame median scaling per DUSt3R", metrics Abs Rel +
# δ<1.25. CUT3R is recurrent; run here on single frames (min_views=1).
#
# STATUS — D24 RESOLVED 2026-05-25 (protocol delta, NOT a model bug):
# Same finding as cut3r-nyuv2. plumbline's kitti_eigen_garg protocol
# (Eigen-652 + Garg crop + clip[1e-3,80]) is STRICTER than the
# DUSt3R-lineage KITTI eval the paper reports (CUT3R's val_selection_cropped,
# 1000 imgs, no crop, max_depth=None), so the observed 0.0858 reads
# *better* than paper 0.092. plumbline's predictions are correct; the
# cell is a documented protocol delta (`paper_match: no` is EXPECTED).
# See D24 in docs/DISCREPANCIES.md.

name: cut3r-kitti
protocol: kitti_eigen_garg

model:
  name: cut3r
  kwargs:
    size: 512

# Per-frame median scaling (paper §4.1, "per DUSt3R"). kitti_eigen_garg
# leaves scale_alignment to the reproduction.
scale_alignment: median
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.092
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, CUT3R (arXiv:2501.12387), Table 1 (Single-frame Depth Evaluation), KITTI Abs Rel column, 'Ours' row = 0.092 (companion δ<1.25 = 91.3; protocol: per-frame median scaling per DUSt3R). Verified by direct PDF read 2026-05-23 (PDF page 5)."
  source_confidence: verified_pdf

notes: >
  Outdoor companion to cut3r-nyuv2 (same Table 1). Needs $CUT3R_ROOT +
  $CUT3R_CKPT (512-DPT weights) + $KITTI_ROOT. Documented PROTOCOL DELTA,
  not a paper-match (D24): plumbline's strict Eigen-652 + Garg-crop
  protocol scores 0.0858 vs the lineage 0.092. Do not expect a ≤5 % match.
