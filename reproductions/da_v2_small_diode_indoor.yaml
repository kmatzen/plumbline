# Depth Anything V2 (small) on DIODE val-indoor
#
# Indoor dense-depth counterpart to da-v2-small-nyuv2 using DIODE rather
# than NYU. DIODE's depth is a LiDAR scan (FARO Focus3D X330), so the
# distribution differs from Kinect-derived NYU: much longer range,
# dense beyond NYU's ~10m, and different sensor noise characteristics.
# DA-V2 paper Table 3 reports relative-depth DIODE-indoor numbers for
# the ViT-S / ViT-B / ViT-L variants.

name: da-v2-small-diode-indoor

model:
  name: depth-anything-v2
  kwargs:
    variant: small

dataset:
  name: diode
  split: val
  kwargs:
    domain: indoors

tasks:
  - mono_depth

# DA-V2 predicts relative disparity; MiDaS-style scale + shift fit in
# inverse-depth space is the protocol papers use for DIODE zero-shot
# evaluation.
scale_alignment: scale_shift
max_views: 1
device: cuda:0
# DIODE indoor depths span ~0–50 m. Use a permissive clip to catch any
# alignment-induced outliers without truncating real far returns.
depth_clip: [0.001, 50.0]

paper_reference:
  primary_metric: abs_rel
  # DA-V2 paper (Yang et al. 2024), Table 2: DIODE zero-shot AbsRel for
  # the relative ViT-S = 0.073 (δ₁ 0.942). The paper evaluates on the
  # COMBINED val split (325 indoor + 446 outdoor = 771 samples); this
  # YAML runs indoor-only. See reproductions/*diode_both* notes for the
  # apples-to-apples paper-match config.
  value: 0.073
  tolerance_relative: 0.10
  citation: "Yang et al. 2024, Depth Anything V2, Table 2. DIODE (combined val), ViT-S (relative)."

notes: >
  First GPU run (RTX 3090 Ti, 2026-04-19, 325 indoor samples only):
  AbsRel=0.0722, δ₁=0.9430, RMSE=0.592m. Effectively matches the
  paper's combined-val AbsRel=0.073 despite the indoor-only slice —
  unsurprising since DIODE-indoor and DIODE-outdoor have similar
  AbsRel footprints. For a strictly-comparable paper-match run use
  domain=both (325+446 samples); this YAML is preserved as an indoor-
  only informational cross-check.

  Needs DIODE val archive unpacked under $DIODE_ROOT (~2.7 GB public,
  resume on truncated downloads). Depth mask from the loader populates
  Sample.depth_valid so invalid LiDAR returns are auto-excluded.
