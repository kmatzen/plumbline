# Depth Anything 3 (Large) on GSO (Google Scanned Objects)
#
# GSO is the Tier-2 synthetic-clean-GT slot post 2026-04-19 pivot.
# Runs the public DA3-LARGE-1.1 checkpoint with MiDaS-style scale+shift
# alignment — same mono-depth protocol as da3-nyuv2. GSO's intrinsics
# are MoGe-bundled, not DA3's own.
#
# Paper target UNVERIFIED. DA3 paper (arXiv:2511.10647) may report GSO
# in Table 4 or elsewhere; cross-check and pin before gating. Running
# this is informational until the value is confirmed.

name: da3-gso
protocol: gso_moge

model:
  name: depth-anything-3
  kwargs:
    variant: large
    checkpoint: depth-anything/DA3-LARGE-1.1

# (dataset/depth_clip/scale_alignment/max_views/tasks: inherited from protocols/gso_moge.yaml)
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # UNVERIFIED — placeholder. DA3 paper Table 4/11 may report GSO;
  # exact row + metric convention TBD.
  value: 0.0
  tolerance_relative: 0.05
  citation: "Bytedance Seed 2025, Depth Anything 3, GSO column (exact row TBD). UNVERIFIED."

notes: >
  Observed (RTX 3090 Ti, 2026-04-19, full 1030-object eval split, ROE):
      AbsRel   0.0150
      delta_1  0.9994
      delta_2  1.0000
      delta_3  1.0000
      RMSE     0.0092

  Zero-shot on GSO — slightly worse than MoGe-1's 0.0094 on the same
  data, which is expected: MoGe rendered these 1030 objects as its
  own eval bundle (same preprocessing pipeline as training-adjacent
  data), while DA3 is genuinely out-of-distribution here. A 60%
  relative gap at the 1-1.5% error regime — both models are
  essentially at-ceiling for synthetic clean-GT, just quantized
  differently by their training distributions.

  Informational-only until the paper GSO number is pinned. DA3 is
  vendored (_vendor/depth_anything_3; deps in base) — no install step.
  First run downloads ~1.5 GB weights.
