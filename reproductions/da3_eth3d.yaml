# Depth Anything 3 (Large) on ETH3D high-res train (native, DA-V2 Table-2)
#
# DA3 paper (arXiv:2511.10647) Table 4: ETH3D δ₁ = 0.986 (DA2 0.865). Table 4
# defers to DA-V2's benchmark, so this uses eth3d_dav2 (native loader, per-view
# laser-scan GT render, scale_shift, [1e-3,80] m) — the protocol that reproduces
# DA-V2's own ETH3D AbsRel 0.131 (da-v2-large-eth3d-native) — NOT eth3d_moge
# (MoGe warp, wrong family + needs the moge package).
#
# BLOCKED ON RAM (2026-06-04): data now staged (/data3) and two real blockers
# fixed en route — a z-buffer splat bug (z broadcast by 3 vs 9, OOM-adjacent
# IndexError; fixed) and a per-view-GT memory cap (max_gt_points=8M). But the
# full ETH3D train-split GT render still OOM-kills a 23 GB box before inference
# (dies at 0 forward passes in the render phase). The path is correct and
# runs — it just needs a larger-RAM box (or a chunked/lazy GT render). NOT a
# model result.
name: da3-eth3d
protocol: eth3d_dav2
model:
  name: depth-anything-3
  kwargs:
    variant: large
    checkpoint: depth-anything/DA3-LARGE-1.1
    process_res: 1008
scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: delta_1
  value: 0.986
  tolerance_relative: 0.02
  citation: "Bytedance Seed 2025, Depth Anything 3, Table 4. ETH3D, δ₁ (DA-V2 protocol). PDF-verified arxiv.org/html/2511.10647."
  source_confidence: verified_pdf
notes: >
  Protocol corrected to eth3d_dav2 (native, no moge); data staged. NOT RUN —
  the per-view-GT render OOM-kills a 23 GB box even with the 8M point cap (dies
  pre-inference). Render-splat bug + memory cap fixed; needs a bigger-RAM box.
