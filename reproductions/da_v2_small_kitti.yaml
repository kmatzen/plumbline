# Depth Anything V2 (small) on KITTI Eigen test split
#
# Outdoor counterpart to da-v2-small-nyuv2. KITTI Eigen is the default
# outdoor mono-depth benchmark: 652-image with-GT subset, evaluated
# against the KITTI Depth-Prediction Benchmark's annotated dense depth
# maps (Uhrig et al. 2017). The DA-V2 paper's Table 2 reports relative-
# depth ViT-S numbers for this protocol.

name: da-v2-small-kitti

model:
  name: depth-anything-v2
  kwargs:
    variant: small

dataset:
  name: kitti
  kwargs:
    # Eigen benchmark subset (652 frames with Uhrig 2017 annotated GT).
    # The file is a bare filename resolved against $KITTI_ROOT — place
    # it at $KITTI_ROOT/eigen_benchmark_test_files.txt (available from
    # github.com/nianticlabs/monodepth2/tree/master/splits/eigen_benchmark).
    sample_list: eigen_benchmark_test_files.txt
    camera: image_02
    apply_garg_crop: true

tasks:
  - mono_depth

# DA-V2 predicts relative disparity — same MiDaS protocol as NYU.
scale_alignment: scale_shift
max_views: 1
device: cuda:0
# KITTI standard eval cap (meters). Papers typically clip aligned
# predictions to this range before metric computation.
depth_clip: [0.001, 80.0]

paper_reference:
  primary_metric: abs_rel
  # DA-V2 paper (Yang et al. 2024, arXiv:2406.09414), Table 2 "Zero-shot
  # relative depth estimation", KITTI column, ViT-S row.
  value: 0.078
  tolerance_relative: 0.10
  citation: "Yang et al. 2024, Depth Anything V2, Table 2 (zero-shot relative depth). KITTI, ViT-S."

notes: >
  ✅ MATCH (2026-04-20, RTX 3090 Ti, 652 Eigen benchmark frames with
  Uhrig 2017 annotated GT, Garg crop, scale_shift alignment):

      abs_rel   delta_1   delta_2   rmse    log10
      0.0770    0.9441    0.9894    3.464   0.0324

  Paper target 0.0780 — observed 0.0770 is 1.3% below (well inside
  ±10% tolerance). First KITTI paper-match row in the matrix.

  Raw drives + annotated-depth archive are public (no ToS). Sample
  list is monodepth2's eigen_benchmark subset; place it at
  $KITTI_ROOT/eigen_benchmark_test_files.txt.
