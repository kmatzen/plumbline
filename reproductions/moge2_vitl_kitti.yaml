# MoGe-2 (ViT-L) on KITTI Eigen benchmark — paper-match
#
# Outdoor KITTI counterpart of moge2-vitl-nyuv2. MoGe-2 is
# affine-invariant (relative depth) — plumbline aligns in
# inverse-depth (disparity) space via scale_shift_robust / ROE, which
# corresponds to the paper's "affine-invariant disparity" column.

name: moge2-vitl-kitti
protocol: kitti_eigen_garg

model:
  name: moge
  kwargs:
    variant: 2-vitl

dataset:
  name: kitti

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Audit 2026-04-20: MoGe-2 paper (Wang et al. 2025, arXiv:2507.02546)
  # does NOT publish a ViT-L per-dataset KITTI cell. Table 1 is
  # averaged across 10 datasets for the full ViT-L model; Table B.4
  # (appendix) shows per-dataset values ONLY for the ViT-Base ablation
  # variant. The previous 0.0392 pin came from the Table B.4
  # ViT-Base ablation block applied (wrongly) to a ViT-L run.
  # Leaving this YAML in-place as an informational ViT-L run; no
  # apples-to-apples paper cell exists yet.
  value: null
  tolerance_relative: null
  citation: "Informational only. MoGe-2 paper publishes ViT-L KITTI only as part of a 10-dataset average (Table 1); no per-dataset ViT-L KITTI cell exists."
  source_confidence: null

notes: >
  Placeholder — observed recorded in follow-up commit.
