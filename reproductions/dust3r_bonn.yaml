# DUSt3R single-frame depth on Bonn — RE-TARGETED 2026-06-18.
#
# This cell evaluates DUSt3R F(I, I) single-frame depth on the lineage's
# 5-sequence Bonn set (balloon2, crowd2, crowd3, person_tracking2,
# synchronous). It originally targeted DUSt3R's OWN Table 2 number
# (AbsRel 0.0808) and read +65 % off (plumbline 0.1337). That was an
# apples-to-oranges comparison, NOT a model/eval defect:
#
#   * DUSt3R's Table 2 (CVPR 2024) reports Bonn 0.0808 on DUSt3R's own
#     2023 Bonn selection, which the paper does not specify and DUSt3R
#     ships NO depth-eval code to recover.
#   * plumbline evaluates on the **MonST3R/CUT3R 5-sequence set** — a
#     *2024* selection, hard-coded in their `eval_metadata.py` /
#     `metadata.py` (the dynamic crowd sequences), which did not exist
#     when DUSt3R was published.
#
# A per-sequence probe (scripts/_dust3r_bonn_recipe_probe.py, 2026-06-18)
# proved the gap is purely the sequence set, not a recipe lever — cap
# (10/70/none), estimator (median / median_lineage), and per-sequence
# vs per-frame scale are ALL near-no-ops. DUSt3R reproduces the paper on
# the simpler sequences (balloon2 0.085 ≈ 0.0808, person_tracking2 0.040)
# and blows up only on the dense crowds (crowd2 0.18, synchronous 0.20).
#
# The correct, apples-to-apples target is therefore **MonST3R Table 3's
# DUSt3R baseline row**, which is DUSt3R single-frame depth scored on
# exactly this 5-sequence set: **Bonn AbsRel 0.141, δ₁ 82.5**. plumbline's
# 0.1337 reproduces it within 5.2 %. (Same pattern as dust3r-co3dv2-pose,
# which targets MASt3R's DUSt3R baseline rather than DUSt3R's own paper.)
#
# The earlier "DUSt3R is a static model, it fails on dynamic Bonn"
# explanation is RETRACTED: DUSt3R's own paper reports 0.0808 on Bonn, so
# the model handles the data — the apparent failure was the wrong target.

name: dust3r-bonn
# `bonn_lineage_110_single`: 5 sequences (balloon2, crowd2, crowd3,
# person_tracking2, synchronous), single-frame depth on the rgb_110 /
# depth_110 subsets paired by sorted index — the EXACT frames MonST3R
# Table 3 scores its DUSt3R baseline on (eval_metadata.py). The
# all-frames `bonn_dust3r_lineage_single` lands at 0.1337 (−5.2 %); this
# like-for-like set gives 0.1384 (−1.8 %).
protocol: bonn_lineage_110_single

model:
  name: dust3r
  kwargs:
    long_edge: 512  # paper "DUSt3R 512" row, default DPT-head model

# Per-frame median scaling — MonST3R §4.2 single-frame recipe. The probe
# confirmed median vs median_lineage move Bonn by <0.003 (unlike NYU,
# where the estimator + Eigen crop matter); median matches MonST3R's
# reported DUSt3R baseline.
scale_alignment: median
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.141
  tolerance_relative: 0.05
  citation: "Zhang et al. 2024, MonST3R (arXiv:2410.03825, ICLR 2025), Table 3 (Single-frame depth evaluation on Sintel/Bonn/KITTI/NYU-v2), DUSt3R baseline row, Bonn column: AbsRel = 0.141, δ<1.25 = 82.5. This is DUSt3R F(I,I) single-frame depth scored on MonST3R's own 5-sequence Bonn set (balloon2/crowd2/crowd3/person_tracking2/synchronous, hard-coded in dust3r/eval_metadata.py) — the SAME set plumbline evaluates, hence the apples-to-apples target. Full DUSt3R row (cross-checks the read): Sintel 0.424/58.7, Bonn 0.141/82.5, KITTI 0.112/86.3, NYU 0.080/90.7 — the KITTI and NYU entries independently match plumbline's own DUSt3R numbers (0.1049, 0.0777-no-crop). DUSt3R's OWN Table 2 reports Bonn 0.0808 but on an unspecified, unrecoverable 2023 sequence selection (no eval code shipped)."
  source_confidence: verified_pdf

notes: >
  Single-frame DUSt3R depth on Bonn, targeted at MonST3R Table 3's
  DUSt3R baseline (0.141) rather than DUSt3R's own Table 2 (0.0808),
  because plumbline — like MonST3R — evaluates on MonST3R's 2024
  5-sequence selection, which DUSt3R's 2023 paper predates and does not
  specify. See the header for the per-sequence probe that ruled out
  every recipe lever and pinned the gap to the sequence set.

  Adapter routing: N=1 → `_dust3r_single_frame_eval` (paper §4.3's
  F(I, I)). Requires $BONN_ROOT containing rgbd_bonn_<name>/ TUM-format
  sequences (rgb/, depth/, groundtruth.txt) and $DUST3R_ROOT (recursive
  clone of https://github.com/naver/dust3r); weights from HF
  naver/DUSt3R_ViTLarge_BaseDecoder_512_dpt. 5 seqs × 110 frames
  (rgb_110) = 550 single-frame inferences; ~10 min on a 1080 Ti.
