# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

scale_alignment: scale_shift
max_views: 1
device: cuda:0
depth_clip: [0.001, 10.0]

paper_reference:
  primary_metric: abs_rel
  # Verified against MoGe paper Table 2 (which reports DA-V2 as a
  # baseline on NYU): DA-V2 ViT-L affine-invariant disparity =
  # Reld 4.20 → 0.0420, δ₁ 98.2. plumbline's scale_shift fits in
  # inverse-depth space, matching this column.
  #
  # The original 0.045 pin came from WebFetch of the DA-V2 paper's own
  # table and may be from a different (e.g. alignment-free, or
  # affine-depth-space) column. Keeping 0.0420 as the verified target.
  value: 0.0420
  tolerance_relative: 0.10
  citation: "MoGe paper Table 2, NYU column, affine-invariant disparity row, DA-V2 ViT-L baseline."

notes: >
  First GPU run against the filled `depths` field (pre-raw-default,
  RTX 3090 2026-04-18): AbsRel=0.0554. After switching the loader default
  to rawDepths the observed value drops into the ±10% window around the
  paper's 0.045.
