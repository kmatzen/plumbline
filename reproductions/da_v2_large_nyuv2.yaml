# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Verified against MoGe paper (Wang et al. 2024, arXiv:2410.19115)
  # Table 3 "Depth Map Estimation" (NOT Table 2 — that's point-map
  # estimation). DA-V2 is reported as a baseline on NYU: DA-V2 ViT-L
  # affine-invariant disparity = Reld 4.20 → 0.0420, δ₁ 98.2.
  # plumbline's scale_shift fits in inverse-depth space, matching this
  # column.
  #
  # The original 0.045 pin came from WebFetch of the DA-V2 paper's own
  # table and may be from a different (e.g. alignment-free, or
  # affine-depth-space) column. Keeping 0.0420 as the verified target.
  # Audit 2026-04-20 corrected the citation from "Table 2" to "Table 3".
  value: 0.0420
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 (Depth Map Est.), NYU column, affine-invariant disparity row, DA-V2 ViT-L baseline."
  source_confidence: verified_pdf

notes: >
  First GPU run against the filled `depths` field (pre-raw-default,
  RTX 3090 2026-04-18): AbsRel=0.0554. After switching the loader default
  to rawDepths the observed value drops into the ±10% window around the
  paper's 0.045.
