# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Two legitimate paper numbers exist for DA-V2 ViT-L on NYU — they
  # disagree because the two papers use different alignment solvers
  # on the same "affine-invariant inverse depth" protocol:
  #
  # - DA-V2's own paper (Yang et al. 2024, arXiv:2406.09414),
  #   Table 2 p. 8: ViT-L NYU AbsRel = 0.045, δ₁ = 0.979. LSQ.
  # - MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3
  #   (Depth Map Est.), DA-V2-L baseline row under "affine-invariant
  #   disparity": AbsRel = 0.0420. MoGe re-ran DA-V2 with their own
  #   (stronger) solver.
  #
  # Plumbline's `scale_shift` is plain LSQ in inverse-depth space —
  # the same solver DA-V2's own paper uses — so the apples-to-apples
  # pin is DA-V2's 0.045. (Historical pin at 0.0420 from MoGe-eval
  # was a leftover from plumbline's earlier scale_shift_robust /
  # Huber-IRLS alignment, which behaved more like MoGe's stronger
  # ROE solver than DA-V2's LSQ.)
  value: 0.045
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 p. 8, NYUv2 Eigen, ViT-L zero-shot relative."
  source_confidence: verified_pdf

notes: >
  First GPU run against the filled `depths` field (pre-raw-default,
  RTX 3090 2026-04-18): AbsRel=0.0554. After switching the loader default
  to rawDepths the observed value drops into the ±5 % window around the
  MoGe-reported 0.0420. Observed 0.0428 on 2026-04-21 rental.
