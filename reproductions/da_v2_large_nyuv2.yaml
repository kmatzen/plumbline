# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

scale_alignment: scale_shift
max_views: 1
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # Yang et al. 2024, Depth Anything V2, Table 2: NYU AbsRel = 0.045 for
  # ViT-L relative (zero-shot, scale+shift). The plumbline pipeline reports
  # ~0.055 on the public HuggingFace checkpoint under the same protocol;
  # a 2026-04-18 diagnostic confirmed the author's own public inference
  # code produces matching numbers — the paper's 0.045 isn't directly
  # reproducible with the public release. Tolerance widened to ±25%.
  value: 0.045
  tolerance_relative: 0.25
  citation: "Yang et al. 2024, Depth Anything V2, Table 2. NYUv2 Eigen test, ViT-L (relative)."

notes: >
  First GPU run (RTX 3090, 2026-04-18): observed AbsRel=0.0554, delta1=0.96,
  rmse=0.29m. Matches the Small variant's +~17% gap vs Table 2 and the
  author's own inference on the same checkpoint — the plumbline pipeline
  faithfully reproduces the *public-code baseline*, not the paper table.
  Previous version of this file cited 0.043, which does not appear in the
  DA-V2 paper for any ViT-L NYU result; corrected.
