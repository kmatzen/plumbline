# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

scale_alignment: scale_shift
max_views: 1
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # Yang et al. 2024, Depth Anything V2, Table 2: NYU AbsRel = 0.043 (Large).
  value: 0.043
  tolerance_relative: 0.10
  citation: "Yang et al. 2024, Depth Anything V2. NYUv2 Eigen test, Large."

notes: >
  First GPU run (RTX 3090, 2026-04-18): observed AbsRel=0.0554 — outside
  the ±10% window (expected ≤0.0473). Small variant matched to ~1% under
  the same pipeline, so alignment / crop / inversion are correct. The
  cited 0.043 almost certainly comes from DA-V2's *metric-indoor-finetuned*
  Large checkpoint (``depth-anything/Depth-Anything-V2-Metric-Indoor-Large-hf``)
  evaluated with ``scale_alignment: none``, not the generic relative Large
  this adapter loads. To actually reproduce 0.043, either: (a) add a
  ``metric-indoor-large`` variant to DepthAnythingV2Adapter targeting that
  checkpoint, or (b) relabel this reproduction as "relative Large" and pin
  ~0.055 as the target from our own measurement. Decide before v0.1 ships.
