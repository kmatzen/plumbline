# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Two published reference numbers exist for DA-V2 ViT-L on NYU:
  #
  # - DA-V2's own paper (Yang et al. 2024, arXiv:2406.09414),
  #   Table 2 p. 8: ViT-L NYU AbsRel = 0.045, δ₁ = 0.979.
  # - MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3
  #   (Depth Map Est.), DA-V2-L baseline row under "affine-invariant
  #   disparity": AbsRel = 0.0420.
  #
  # Empirically, plumbline (paper `.pth` + scale_shift LSQ in disparity
  # space) reproduces 0.0427 — 1.6 % off MoGe's 0.0420 and 5.2 % off
  # DA-V2's own 0.045. Both papers claim "affine-invariant disparity"
  # LSQ but disagree by 7 % on the same checkpoint — likely a
  # crop / GT-field / resolution delta between their eval pipelines.
  # plumbline's numerical twin is MoGe's eval (same plain
  # align_affine_lstsq path, no IRLS), so we pin MoGe's value and
  # record DA-V2's in the citation for traceability.
  value: 0.0420
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3, NYU affine-invariant disparity row, DA-V2-L baseline. DA-V2 paper Table 2 p. 8 reports 0.045 under its own eval pipeline (same model, ~7 % gap from MoGe's reeval — source of the two-paper citation split)."
  source_confidence: verified_pdf

notes: >
  Observed AbsRel = 0.0427 on 2026-04-21 rental (paper `.pth` +
  scale_shift LSQ). Matches MoGe-reported 0.0420 within 1.6 %; 5.2 %
  off DA-V2's own 0.045. First GPU run against the filled `depths`
  field (pre-raw-default, RTX 3090 2026-04-18): AbsRel = 0.0554. After
  switching the NYU loader default to rawDepths the observed dropped
  into the current ±5 % window around 0.0420.
