# Depth Anything V2 (large) on NYUv2 Eigen test split
#
# Second mono-depth paper-match anchor, same pipeline as the Small
# reproduction. Large checkpoint is ~1.3 GB; first run downloads it from
# HuggingFace.

name: da-v2-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: large

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Two legitimate paper numbers exist for DA-V2 ViT-L on NYU — they
  # disagree because the papers use different alignment solvers on
  # the SAME protocol (affine-invariant inverse depth):
  #
  # - DA-V2's own paper (Yang et al. 2024, arXiv:2406.09414),
  #   Table 2 p. 8: ViT-L NYU AbsRel = 0.045, δ₁ = 0.979.
  # - MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3 (Depth
  #   Map Est.) DA-V2-L baseline row under "affine-invariant
  #   disparity": AbsRel = 0.0420. MoGe re-ran DA-V2 with their ROE
  #   solver, which is stronger than DA-V2's own eval.
  #
  # Plumbline's `scale_shift` is LSQ in inverse-depth space — closer
  # to DA-V2 paper's own protocol than to MoGe's ROE. Keeping the
  # MoGe-reported 0.0420 as the pin because it's the tighter of the
  # two and the observed 0.0428 lands at 1.9 % — within tolerance.
  # 2026-04-21 cross-verified both values directly against the PDFs.
  value: 0.0420
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 (Depth Map Est.), NYU column, affine-invariant disparity row, DA-V2 ViT-L baseline. DA-V2 paper Table 2 p. 8 reports 0.045 for the same model under their own alignment."
  source_confidence: verified_pdf

notes: >
  First GPU run against the filled `depths` field (pre-raw-default,
  RTX 3090 2026-04-18): AbsRel=0.0554. After switching the loader default
  to rawDepths the observed value drops into the ±5 % window around the
  MoGe-reported 0.0420. Observed 0.0428 on 2026-04-21 rental.
