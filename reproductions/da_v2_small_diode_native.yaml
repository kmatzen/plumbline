# Depth Anything V2 (small) on DIODE val — DA-V2's OWN Table 2.
#
# Native-loader, combined-val counterpart to the informational
# da-v2-small-diode-indoor cell. Targets DA-V2's own Table 2 (zero-shot
# relative depth, DIODE column, ViT-S row) = 0.073 AbsRel, NOT MoGe's
# Table 3 re-eval (0.0533, which is ViT-L). New protocol+variant coverage.

name: da-v2-small-diode-native
protocol: diode_dav2

model:
  name: depth-anything-v2
  kwargs:
    variant: small

# DA-V2 predicts affine-invariant inverse depth (MiDaS-style disparity).
scale_alignment: scale_shift
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.073
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 (zero-shot relative depth estimation), DIODE column, Depth-Anything-V2 ViT-S row: AbsRel = 0.073. Affine-invariant inverse depth (per table caption). Verified by ar5iv PDF read 2026-05-28."
  source_confidence: verified_pdf

notes: >
  ⚠️ RAN 2026-06-18 (anima 1080 Ti, vendored DA-V2 paper path, 771/771
  domain=both, 0 skipped): AbsRel **0.2196** vs paper **0.073** — a 3×
  MISMATCH. NOT tuned (the DIODE-outdoor far-depth >50 m clip is a known
  lever but tuning it to chase a number is off-limits). The result instead
  CONFIRMS that DA-V2 Table 2's DIODE 0.073 is the **indoor** convention,
  not combined-val: the sibling da-v2-small-diode-indoor reproduces 0.073 at
  AbsRel 0.0722 (325-img indoor val, 1.1% off), matching the indoor-only
  DIODE protocol the rest of the literature uses (e.g. UniK3D's 325-img
  indoor val). So the paper-faithful cell is the indoor one; this domain=both
  variant is an informational off-paper experiment, superseded. Needs DIODE
  val unpacked at $DIODE_ROOT (~2.7 GB).
