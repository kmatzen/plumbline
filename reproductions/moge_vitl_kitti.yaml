# MoGe (ViT-L) on KITTI Eigen benchmark — MoGe-paper protocol
#
# Outdoor KITTI counterpart of moge-vitl-nyuv2. MoGe-1 is affine-
# invariant (relative depth); alignment is plain LSQ in disparity
# space plus MoGe's per-sample disparity floor at 1/gt.max()
# (scale_shift_clamped) to match `moge/test/metrics.py`. Uses
# MoGe's HF-bundle KITTI data + the kitti_moge_eval protocol —
# closes D8 in docs/DISCREPANCIES.md (the prior Monodepth2-Eigen +
# Garg + 80 m clip setup landed 9.4 % off the paper's 0.0408).

name: moge-vitl-kitti
protocol: kitti_moge_eval

model:
  name: moge
  kwargs:
    variant: vitl

scale_alignment: scale_shift_clamped
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3 "Depth
  # Map Estimation", KITTI column, "Affine-invariant disparity" row,
  # ViT-L: Reld 4.08 / δ₁ 98.1 (= AbsRel 0.0408, δ₁ 0.981).
  # Audit 2026-04-20: earlier "Table 2" citation was wrong — MoGe
  # Table 2 is point-map estimation; depth results live in Table 3.
  # Earlier pinned value 0.0405 was a transcription error; paper cell
  # reads 4.08, not 4.05.
  value: 0.0408
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 (Depth Map Est.), KITTI column, affine-invariant disparity row, ViT-L."
  source_confidence: verified_pdf

notes: >
  Placeholder — observed recorded in follow-up commit.
