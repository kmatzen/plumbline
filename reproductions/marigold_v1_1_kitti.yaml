# Marigold (v1-1) on KITTI Eigen benchmark
#
# KITTI counterpart of marigold-v1-1-nyuv2. Same paper protocol
# (4 inference steps × 10 ensemble × fp16) and the same depth-space
# alignment as NYU — Marigold outputs affine-invariant depth, so the
# fit is gt ≈ s*pred + b in depth space, not disparity.

name: marigold-v1-1-kitti
protocol: marigold_kitti_eval

model:
  name: marigold
  kwargs:
    variant: v1-1
    # Match prs-eth/Marigold's official eval script for KITTI:
    # script/depth/eval/21_infer_kitti.sh invokes script/depth/infer.py
    # with --denoise_steps 1 --ensemble_size 10 --seed 1234, no --fp16.
    # The v1-1 checkpoint is a 1-step distilled variant; higher
    # denoise_steps change the prediction distribution. Using fp32
    # matches the default (fp16 is an opt-in speed flag, not the
    # leaderboard config). 2026-04-24: fixed to match paper infer.
    num_inference_steps: 1
    ensemble_size: 10
    dtype: float32
    seed: 1234
    processing_res: 0  # native resolution (no resize); paper default

scale_alignment: scale_shift_depth
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Marigold paper (Ke et al. 2024, arXiv:2312.02145), Table 1, KITTI
  # "Ours (w/ ensemble)": AbsRel 9.9, δ₁ 91.6 (= AbsRel 0.099,
  # δ₁ 0.916). Paper protocol: least-squares align in disparity space
  # per the implementation — but the checkpoint outputs affine-invariant
  # DEPTH [0, 1] that the paper inverts; scale_shift_depth matches the
  # public implementation's eval.py.
  value: 0.099
  tolerance_relative: 0.05
  citation: "Ke et al. 2024, Marigold, Table 1. KITTI Eigen test, w/ 10-ensemble."
  source_confidence: verified_pdf

notes: >
  Observed AbsRel 0.1095 / δ₁ 0.8884 (GTX 1080 Ti, 2026-06-01, full
  652-frame Eigen-benchmark split, skipped=0, scale_shift_depth, 1-step
  ×10-ensemble v1-1 fp32). **+10.6% over paper 0.099 — MISMATCH, and
  expected.** Same shape as D9 (Marigold-KITTI in docs/DISCREPANCIES /
  the GPU-run notes): the paper's 0.099 comes from Marigold **v1-0 at
  50 DDIM steps** (reproduces to 0.0992), whereas this cell pins the
  post-paper **v1-1 1-step distilled** checkpoint that
  script/depth/eval/21_infer_kitti.sh now defaults to. The distilled
  1-step variant trades ~10% accuracy for a ~50x speedup, so it lands
  off-paper by construction; it is NOT an adapter/protocol bug.
  (The NYU sibling marigold-v1-1-nyuv2 is likewise ~5% off for the same
  reason.) To paper-match, a separate v1-0/50-step cell would be needed.
