# π³ (Pi3X variant) on DTU MVS — informational smoke run.
#
# π³ paper (Yuan et al. 2025, arXiv:2507.13347) Table 3 reports DTU
# accuracy + completion + N.C. separately, not an "Overall" like VGGT's
# Table 2. Additionally the paper's numeric units are not definitionally
# matched to plumbline's loader output (VGGT 0.382 overall in mm;
# π³ mean-Acc 1.198 — likely either a different unit or a different
# evaluation-subset convention). Leaving the target UNPINNED until the
# first GPU run observation gives us a concrete plumbline-side number
# to compare against the paper cells.

name: pi3-dtu-mvs
protocol: dtu_vggt_table2

model:
  name: pi3
  kwargs:
    variant: pi3x
    dtype: bfloat16

device: cuda:0

paper_reference:
  primary_metric: chamfer
  # Pi3 Table 3 reports DTU: Accuracy 1.198 / Completion 1.849 /
  # Normal Consistency 0.678. plumbline's DTU loader reports chamfer
  # as (Acc + Comp) / 2, mirroring VGGT's protocol. A direct
  # paper-match here requires confirming Pi3 uses the same MVSNet-22
  # subset + mm units that VGGT's 0.382 does.
  value: null
  tolerance_relative: null
  citation: "Yuan et al. 2025, π³ (arXiv:2507.13347), Table 3. DTU Accuracy=1.198, Completion=1.849 — unit convention vs plumbline's mm chamfer not yet confirmed."
  source_confidence: null

notes: >
  Direct A/B with vggt-paper-dtu-mvs — same protocol preset
  (dtu_vggt_table2), same 22-scan test set, same ICP alignment.
  The observed (Acc, Comp, Overall) from the first GPU run is the
  basis for deciding whether π³'s paper cells can be pinned as a
  paper-match target (unit convention check) or whether they're
  reporting under a different metric normalization.
