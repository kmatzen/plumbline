# CUT3R single-frame depth on NYUv2 — PREPARED-SET reproduction (Table 1).
#
# Targets CUT3R Table 1 "Single-frame Depth Evaluation" (Wang et al. 2025,
# arXiv:2501.12387), NYU-v2 "Ours" row: Abs Rel = 0.086 (δ<1.25 = 90.9;
# verified_pdf 2026-05-23, PDF page 5) — evaluated on CUT3R's OWN prepared
# eval set, the apples-to-apples reproduction of the paper number.
#
# THE POINT: this cell pairs the byte-verified CUT3R adapter with the exact
# data CUT3R's paper uses. The companion `cut3r-nyuv2` (strict nyu_eigen_2014,
# 0.0522) and `cut3r-nyuv2-lineage` (filled-GT labeled.mat, 0.0777) both read
# off-paper-better purely because they score DIFFERENT NYU data; inference is
# byte-identical to CUT3R's own (scripts/_cut3r_nyu_input_diff.py, max|Δ|=0).
# Here the `nyu-cut3r-eval` loader reads the MonST3R-prepared set (HF
# sayakpaul/nyu_depth_v2 val, 654 .h5 -> nyu_images PNG + nyu_depths .npy)
# that CUT3R's eval/monodepth consumes, so plumbline's harness should land
# at ~0.086 → a real plumbline ✓.
#
# Eval recipe = CUT3R's: per-frame median scale, no depth cap (max_depth=None),
# valid mask = gt>0. Stage the data with scripts/stage_nyu_cut3r_eval.sh.
#
# RESULT — RAN 2026-06-14 on anima (654/654): AbsRel **0.07770** vs paper 0.086
# (9.6% under) — *identical* to `cut3r-nyuv2-lineage` (0.07770 on labeled.mat).
# SURPRISE / KEY FINDING: scoring CUT3R's EXACT prepared data did NOT close the
# gap, so the residual is NOT the eval data — it is plumbline's eval MECHANICS
# vs CUT3R's `depth_evaluation`. Both use plain median (median(gt)/median(pred))
# + abs_rel = mean(|pred-gt|/gt), and inference is byte-identical (max|Δ|=0),
# so the ~10% lives in (a) eval resolution — CUT3R `cv2.resize`s pred UP to GT
# 640x480 (eval_metrics.py:171); plumbline tends to downsample GT to pred-res —
# and/or (b) the masked-pixel set the median+metric are computed over. The
# decisive next step is a re-score of plumbline's cached preds through CUT3R's
# `depth_evaluation` to pinpoint the knob (no GPU). Until then this is ℹ️, same
# documented scoring-mechanics shape as D27/D28. The loader itself is correct
# (it serves CUT3R's exact prepared set) and reusable for the lineage.

name: cut3r-nyuv2-prepared

model:
  name: cut3r
  kwargs:
    size: 512

dataset:
  name: nyu-cut3r-eval

tasks: [mono_depth]
# Per-frame median scaling, no clip (CUT3R eval/monodepth: depth_evaluation
# max_depth=None, lr=1e-3 -> median).
scale_alignment: median
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.086
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, CUT3R (arXiv:2501.12387), Table 1 (Single-frame Depth Evaluation), NYU-v2 Abs Rel column, 'Ours' row = 0.086 (companion δ<1.25 = 90.9; protocol: per-frame median scaling per DUSt3R, on the MonST3R-prepared NYU-v2 val set). Verified by direct PDF read 2026-05-23 (PDF page 5)."
  source_confidence: verified_pdf

notes: >
  Prepared-set reproduction (vs the strict `cut3r-nyuv2` and lineage
  `cut3r-nyuv2-lineage` siblings, which score different NYU data). Needs
  $CUT3R_ROOT + $CUT3R_CKPT (512-DPT; curope optional — pytorch RoPE fallback
  works) + $NYU_CUT3R_EVAL_ROOT (stage via scripts/stage_nyu_cut3r_eval.sh).
  The `nyu-cut3r-eval` loader is reusable for the MonST3R / DUSt3R NYU cells.
