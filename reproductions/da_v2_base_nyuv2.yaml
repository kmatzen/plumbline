# Depth Anything V2 (Base) on NYUv2 Eigen test split
#
# Fills the B in S/B/L coverage for DA-V2 Table 2 on NYU.

name: da-v2-base-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: base

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # UNVERIFIED — originally 0.049 from WebFetch of DA-V2 paper's per-
  # variant table. User has verified only the DA-V2 ViT-L affine-
  # disparity value (0.0420, see da_v2_large_nyuv2.yaml). The per-
  # variant Small/Base numbers haven't been cross-checked against
  # the paper directly. plumbline observed 0.0456 is plausibly close
  # to paper-for-this-variant but treat the match claim as
  # unverified until confirmed.
  value: 0.049
  tolerance_relative: 0.05
  citation: "UNVERIFIED — DA-V2 paper per-variant NYU table needs direct read."
  source_confidence: verified_pdf

notes: >
  Base checkpoint is ~400 MB; first run downloads from HuggingFace.
  Observed AbsRel=0.0456, δ₁=0.977 (RTX 3090, 2 min) — 7% below paper.
