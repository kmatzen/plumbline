# Depth Anything V2 (Base) on NYUv2 Eigen test split
#
# Fills the B in S/B/L coverage for DA-V2 Table 2 on NYU.

name: da-v2-base-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: base

dataset:
  name: nyuv2

scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Verified 2026-04-21 against DA-V2 paper (Yang et al. 2024,
  # arXiv:2406.09414), Table 2 on p. 8. ViT-B NYU AbsRel = 0.049,
  # δ₁ = 0.976 in the zero-shot relative-depth evaluation block.
  # Paper uses affine-invariant inverse-depth alignment
  # ("our models produce affine-invariant inverse depth", §5
  # preamble), matching plumbline's `scale_shift` mode which fits in
  # inverse-depth space.
  value: 0.049
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 p. 8. NYUv2 Eigen, ViT-B zero-shot relative."
  source_confidence: verified_pdf

notes: >
  Base checkpoint is ~400 MB; first run downloads from HuggingFace.
  Observed AbsRel = 0.0456 on 2026-04-21 rental (RTX 3090, 2 min) —
  7 % below paper's 0.049. Citation is now verified so the 7 % is a
  real reproduction delta, not a paper-number error. Likely sources:
  LSQ vs DA-V2's own alignment solver, subtle Eigen-crop or depth-
  field differences, or HF-checkpoint drift since paper publication.
  Small and Large cells both match paper within tolerance on the
  same pipeline (0.051 vs 0.053; 0.043 vs 0.045) so Base is
  specifically the variant that misses.
