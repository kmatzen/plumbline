# Depth Anything V2 (Base) on NYUv2 Eigen test split
#
# Fills the B in S/B/L coverage for DA-V2 Table 2 on NYU.

name: da-v2-base-nyuv2

model:
  name: depth-anything-v2
  kwargs:
    variant: base

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

scale_alignment: scale_shift
max_views: 1
device: cuda:0
depth_clip: [0.001, 10.0]

paper_reference:
  primary_metric: abs_rel
  # Yang et al. 2024, DA-V2, Table 2: NYU ViT-B AbsRel=0.049, δ₁=0.976.
  # Our Eigen + rawDepths + depth_clip pipeline consistently lands 5-8%
  # BETTER than paper across S/B/L — ±10% reflects that empirical band.
  value: 0.049
  tolerance_relative: 0.10
  citation: "Yang et al. 2024, Depth Anything V2, Table 2. NYUv2 Eigen test, ViT-B (relative)."

notes: >
  Base checkpoint is ~400 MB; first run downloads from HuggingFace.
  Observed AbsRel=0.0456, δ₁=0.977 (RTX 3090, 2 min) — 7% below paper.
