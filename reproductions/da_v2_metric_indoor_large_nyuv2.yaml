# Depth Anything V2 Metric Indoor (Large) on NYUv2 Eigen test split
#
# Runs the Hypersim-finetuned metric checkpoint on NYU, median-aligned
# per sample. There is no directly-published "paper number" to target —
# DA-V2 Table 4a reports an *NYU-finetuned* ViT-L at AbsRel=0.056, but
# that's a different checkpoint from the Hypersim-trained one we load
# here. We keep this as an informational run to anchor the metric-indoor
# variant's behaviour on NYU until a proper cross-domain paper number
# lands or we wire the NYU-finetuned checkpoint.

name: da-v2-metric-indoor-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-anything-v2
  kwargs:
    variant: metric-indoor-large

dataset:
  name: nyuv2

# The HuggingFace port of the metric checkpoint and the *author's own*
# checkpoint agree per-pixel to within 0.2% (2026-04-18 diagnostic), but
# both carry a systematic ~1.34x overshoot against NYU GT in meters —
# intrinsic to the Hypersim-trained metric model on cross-domain NYU.
# Median alignment gives ~0.061 on the full 654-sample split; unaligned
# is ~0.33.
scale_alignment: median
device: cuda:0
paper_reference:
  # Intentionally no numeric target. Closest published number from the
  # DA-V2 paper is Table 4a's 0.056 for the *NYU-finetuned* ViT-L, which
  # is a different checkpoint. Keeping primary_metric so the runner still
  # reports AbsRel cleanly; tolerance is permissive because there's no
  # reference to compare against.
  primary_metric: abs_rel
  tolerance_relative: 1.0
  citation: "No direct paper reference for Hypersim-finetuned ViT-L on NYUv2."

notes: >
  First GPU run (RTX 3090, 2026-04-18, full 654-sample Eigen test split):
  median-aligned AbsRel=0.0613, delta1=0.9517, rmse=0.322m. Unaligned
  ~0.33. Author and HuggingFace checkpoints agree to 0.2% per-pixel, so
  the HF port is faithful; the 1.34x bias is a cross-domain property of
  the Hypersim-trained model on NYU. Informational only — no paper match
  is expected.
