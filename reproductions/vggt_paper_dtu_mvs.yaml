# VGGT dense MVS on DTU
#
# This is the paper-match configuration that REPLACES the original
# vggt-paper-scannet-depth gate (the VGGT paper doesn't actually report
# ScanNet depth — see that YAML's notes). The VGGT paper's headline
# depth/point-map evaluation is Table 2: Dense MVS Estimation on DTU,
# measuring accuracy + completeness + overall (chamfer distance).
#
# Published VGGT row (Table 2, lower block, "methods that do not know
# the ground-truth camera"):
#     Accuracy  0.389
#     Completeness  0.374
#     Overall (Chamfer)  0.382
# Protocol: "follows MASt3R" per paper section 4.2.

name: vggt-paper-dtu-mvs
protocol: dtu_vggt_table2

model:
  name: vggt
  kwargs:
    dtype: bfloat16

# (dataset/views_per_sample/light, scale_alignment=none, pointcloud_alignment=icp,
#  max_views, tasks: inherited from protocols/dtu_vggt_table2.yaml.)
device: cuda:0

paper_reference:
  primary_metric: chamfer
  value: 0.382
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, VGGT, Table 2. DTU dense MVS, VGGT (no-GT-camera block). Acc=0.389, Comp=0.374, Overall=0.382."
  source_confidence: verified_pdf

notes: >
  New v0.1 paper-match gate. The DTU loader is now registered
  (src/plumbline/datasets/dtu.py); data is public (no ToS). Unblock by:
    1. Download DTU MVS + MVSNet preprocessing per the dtu.py docstring.
    2. export DTU_ROOT=/path/to/mvsnet_dtu
    3. plumbline reproduce vggt-paper-dtu-mvs

  Expected chamfer: within ±5% of 0.382 (mm). The loader keeps units in
  mm end-to-end (both GT cloud and cam-file translations); VGGT's point
  map will be in the same unit after the camera-centres Umeyama fit.

  The MASt3R DTU protocol has per-scan view counts and an optional
  outlier-filtering step on the predicted cloud; the first GPU run
  should measure the unfiltered prediction first, then toggle filtering
  to measure sensitivity. Tolerance is tight (±5%) because the protocol
  is well-specified and VGGT is ~stable on DTU's clean imagery.
