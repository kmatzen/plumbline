# GPU run queue — the executable backlog of reproductions awaiting a GPU.
#
# This is the machine-readable counterpart to GPU_RUNBOOK.md. Each job
# points at an existing reproduction (by its `name:`) and carries the
# operator context needed to provision a rental box. `plumbline queue`
# lists it; `plumbline queue --run` executes the `pending` jobs in
# priority order and records MATCH / MISMATCH / ERROR for each.
#
# Hard rules (mirror GPU_RUNBOOK.md):
#   - A failed paper-match is a finding, not a number to tune.
#   - `blocked` jobs are NOT run — they document what not to waste GPU
#     time on (upstream-blocked cells, data not yet staged).
#   - Status here is hand-maintained: flip a job to `done` only after a
#     run lands within tolerance and the matrix in REPRODUCTIONS.md is
#     updated.
#
# status: pending | blocked | done
# priority: lower runs first (ties broken by file order)

schema_version: "1.0.0"

jobs:
  # ----- Tier 1: verified paper targets, just need the GPU run -----
  - name: vggt-co3dv2-pose
    status: pending
    priority: 1
    paper_target: "VGGT Table 1 — CO3Dv2 AUC@30 = 0.882 (verified_pdf 2026-05-03)"
    primary_metric: pairwise_pose_auc@30
    datasets: [co3dv2]
    data_footprint_gb: 45
    est_wall_min: 60
    requires_env: [CO3DV2_ROOT]
    extras: "VGGT: uv pip install 'git+https://github.com/facebookresearch/vggt'"
    notes: >
      Converts the first pose cell from infra-only to ✅ or surfaces a
      real gap. Gates the pose half of the v0.1 release (plan.md §2
      acceptance criterion #2). 41-cat / 10-seq / 10-frame seeded
      recipe (co3dv2-vggt-pose-eval loader).

  - name: mast3r-co3dv2-pose
    status: pending
    priority: 2
    paper_target: "MASt3R Table 3 — CO3Dv2 mAA(30) = 0.818, RRA@15 0.946, RTA@15 0.919 (verified_pdf 2026-05-23, direct PDF read; D23 resolved)"
    primary_metric: pairwise_pose_auc@30
    datasets: [co3dv2]
    data_footprint_gb: 45
    est_wall_min: 150
    requires_env: [CO3DV2_ROOT, MAST3R_ROOT]
    extras: >
      MASt3R: git clone --recursive https://github.com/naver/mast3r
      $HOME/deps/mast3r; uv pip install roma scikit-learn trimesh;
      export MAST3R_ROOT=$HOME/deps/mast3r
    notes: >
      N=10 dispatches to dust3r PointCloudOptimizer (init=mst,
      niter=300). ~20 s/sample × 410 ≈ 2.5 h on a 3090. Shares the
      co3dv2-vggt-pose-eval loader with the VGGT job, so stage CO3Dv2
      once and run both back-to-back.

  # ----- D24 RESOLVED 2026-05-25: protocol deltas, all 3 paper cells CONFIRMED via
  # exact-set reproduction (CUT3R's own eval). Blocked = nothing left to run; the
  # prepared eval data is mirrored at s3://plumbline-bench/datasets/cut3r_eval/. -----
  - name: cut3r-nyuv2
    status: blocked
    priority: 15
    blocked_on: >
      D24 RESOLVED — plumbline cell 0.0522 (vs paper 0.086) under its
      stricter raw+crop protocol = documented protocol delta, NOT a model
      bug. The apples-to-apples exact-set reproduction is DONE: CUT3R's own
      eval on its exact prepared NYU set = 0.08595 vs paper 0.086 (0.06 %).
      Nothing left to run; do not re-queue.
    paper_target: "CUT3R Table 1 — NYU-v2 single-frame Abs Rel = 0.086 (verified_pdf 2026-05-23)"
    primary_metric: abs_rel
    datasets: [nyuv2]
    data_footprint_gb: 3
    est_wall_min: 40
    requires_env: [NYUV2_ROOT, CUT3R_ROOT, CUT3R_CKPT]
    extras: >
      CUT3R: git clone https://github.com/CUT3R/CUT3R $HOME/deps/cut3r;
      cd $HOME/deps/cut3r && pip install -r requirements.txt; export
      CUT3R_ROOT=$HOME/deps/cut3r; download the 512-DPT weights per the
      repo README and export CUT3R_CKPT=$CUT3R_ROOT/src/cut3r_512_dpt_4_64.pth
    notes: >
      Closed the video / unordered-collection coverage gap. Ran on GPU
      2026-05-25; the off-paper-better result is an explained protocol
      delta (D24). See docs/DISCREPANCIES.md D24.

  - name: cut3r-kitti
    status: blocked
    priority: 16
    blocked_on: >
      D24 RESOLVED — plumbline cell 0.0858 (vs paper 0.092) = protocol
      delta (Eigen-652 + Garg crop vs the lineage gathered set), NOT a
      model bug. Exact-set reproduction DONE: CUT3R's own eval on its
      gathered set (1269 pairs) = 0.09219 vs paper 0.092 (0.2 %). Nothing
