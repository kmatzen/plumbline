    paper_target: "CUT3R Table 1 — KITTI single-frame Abs Rel = 0.092 (verified_pdf 2026-05-23)"
    primary_metric: abs_rel
    datasets: [kitti]
    data_footprint_gb: 6
    est_wall_min: 50
    requires_env: [KITTI_ROOT, CUT3R_ROOT, CUT3R_CKPT]
    extras: "CUT3R — same setup as cut3r-nyuv2."
    notes: >
      Outdoor companion to cut3r-nyuv2 (same Table 1). Ran 2026-05-25;
      off-paper-better is an explained protocol delta (D24).

  - name: cut3r-bonn
    status: blocked
    priority: 17
    blocked_on: >
      D24 RESOLVED — plumbline cell 0.0536 (vs paper 0.078) = protocol/
      selection delta, NOT a model bug. Exact-set reproduction DONE via
      CUT3R's VIDEO eval (per-seq scale = Table 2) on the 5-seq × 110-frame
      set = 0.07661 vs paper 0.078 (1.8 %). Nothing left to run.
    paper_target: "CUT3R Table 2 — Bonn VIDEO depth (per-sequence scale) Abs Rel = 0.078 (verified_pdf 2026-05-23)"
    primary_metric: abs_rel
    datasets: [bonn]
    data_footprint_gb: 4
    est_wall_min: 40
    requires_env: [BONN_ROOT, CUT3R_ROOT, CUT3R_CKPT]
    extras: >
      Bonn: extract the rgbd_bonn_<name>.zip archives (no auth) from
      https://www.ipb.uni-bonn.de/data/rgbd-dynamic-dataset/ under
      $BONN_ROOT. CUT3R as for cut3r-nyuv2.
    notes: >
      First genuine VIDEO reproduction (one sample = one sequence, recurrent
      multi-frame, per-sequence median scale). Ran 2026-05-25; off-paper is
      an explained protocol/selection delta (D24). Demonstrates the video
      task end-to-end.

  # ----- Tier 2: informational runs (no paper target; A/B + smoke) -----
  - name: da3-co3dv2-pose
    status: pending
    priority: 4
    paper_target: "none — informational A/B vs VGGT/MASt3R (DA3 paper does not evaluate CO3Dv2 pose)"
    primary_metric: pairwise_pose_auc@30
    datasets: [co3dv2]
    data_footprint_gb: 45
    est_wall_min: 60
    requires_env: [CO3DV2_ROOT]
    extras: "DA3 ships in the base install (transformers)."
    notes: >
      No paper_match expected (value: null). Run only if CO3Dv2 is
      already staged for the Tier-1 jobs — it's a free A/B data point
      on the same loader.

  - name: pi3-dtu-mvs
    status: pending
