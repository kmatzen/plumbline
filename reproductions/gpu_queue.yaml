    priority: 2
    paper_target: "MASt3R Table 3 — CO3Dv2 mAA(30) = 0.818, RRA@15 0.946, RTA@15 0.919 (verified_pdf 2026-05-23, direct PDF read; D23 resolved)"
    primary_metric: pairwise_pose_auc@30
    datasets: [co3dv2]
    data_footprint_gb: 4
    est_wall_min: 150
    requires_env: [CO3DV2_ROOT, MAST3R_ROOT]
    extras: >
      MASt3R: git clone --recursive https://github.com/naver/mast3r
      $HOME/deps/mast3r; uv pip install roma scikit-learn trimesh;
      export MAST3R_ROOT=$HOME/deps/mast3r. For practical wall-time also
      build the curope CUDA ext in MASt3R's dust3r fork
      ($MAST3R_ROOT/dust3r/croco/models/curope; python setup.py
      build_ext --inplace, CUDA_HOME=/usr/local/cuda-12.1). Without it,
      MASt3R falls back to a pytorch RoPE2D and per-sample wall climbs
      from ~50 s to ~70 s.
    notes: >
