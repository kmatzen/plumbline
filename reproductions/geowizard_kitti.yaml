# GeoWizard (Fu et al. 2024) on KITTI Eigen-benchmark — paper-match.
#
# Outdoor counterpart to geowizard-nyuv2. GeoWizard's `domain` kwarg
# toggles an embedding that trades near-field detail vs far-field
# range; outdoor is the correct setting for KITTI.

name: geowizard-kitti
protocol: marigold_kitti_eval

model:
  name: geowizard
  kwargs:
    domain: outdoor
    # 50 not 10: matches the README's "For academic comparison" guidance
    # rather than `run_infer.py`'s in-the-wild argparse default. Same
    # change as geowizard-nyuv2; verified on NYU sub60 to move the
    # metric by only ~0.3 % (within noise), so this also won't close
    # D18's residual gap (paper-private best-of-N seed selection per
    # the paper author's statement on `fuxiao0719/GeoWizard#36`; same
    # root cause as D17). Bumped 2026-05-26 for paper-protocol intent.
    num_inference_steps: 50
    ensemble_size: 10
    processing_res: 768
    # Upstream's run_infer.py --half_precision flag is dead (dtype set
    # but never applied to the pipeline). Canonical paper-protocol is
    # fp32. Same fix as geowizard-nyuv2; carries D17's diagnosis to the
    # parallel D18 KITTI cell.
    dtype: float32
    seed: 2024

scale_alignment: scale_shift_depth
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # GeoWizard paper (Fu et al. 2024, arXiv:2403.12013), Table 1
  # KITTI column, GeoWizard (Ours) row: AbsRel = 9.7 → 0.097,
  # δ₁ = 92.1 → 0.921. Values ×100 in the paper.
  value: 0.097
  tolerance_relative: 0.05
  citation: "Fu et al. 2024, GeoWizard (arXiv:2403.12013), Table 1 (6 zero-shot affine-invariant depth benchmarks), KITTI AbsRel column, 'GeoWizard (Ours)' row."
  source_confidence: verified_pdf

notes: >
  Outdoor mode. GeoWizard's KITTI AbsRel (0.097) is higher than
  DA-V2-small's (0.078) and Marigold's (0.099) on the same
  Eigen-benchmark protocol — in-line expectation for a diffusion
  model at outdoor scale.
