# MoGe-2 (ViT-L, metric) on NYUv2 Eigen test split
#
# Companion to moge-vitl-nyuv2 (the v1 affine-invariant config).
# MoGe-2 predicts metric depth directly (is_metric=True on the
# adapter instance); the paper still reports it under affine-invariant
# alignment on the zero-shot NYU table for apples-to-apples with v1
# and DA-V2 / Metric3D baselines, so we match that protocol here with
# scale_shift rather than no-alignment.

name: moge2-vitl-nyuv2

model:
  name: moge
  kwargs:
    variant: 2-vitl

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

scale_alignment: scale_shift_robust
max_views: 1
device: cuda:0
depth_clip: [0.001, 10.0]

paper_reference:
  primary_metric: abs_rel
  # No target pinned — MoGe-2 update paper's NYU row needs to be
  # verified directly (not via WebFetch; prior responses fabricated
  # a "Table 3" for MoGe v1 that doesn't exist). Observed 0.0305
  # under scale_shift_robust; indistinguishable from MoGe-1's 0.0305
  # because under disparity-space alignment the metric vs affine-
  # invariant distinction is absorbed.
  tolerance_relative: 1.0
  citation: "UNVERIFIED — needs direct paper read for MoGe-2 NYU affine-invariant disparity row."

notes: >
  ROE run (RTX 3090 Ti, 2026-04-19, 654-sample Eigen test split,
  scale_shift_robust alignment):
      AbsRel   0.0305
      delta_1  0.9833

  v1-vs-v2 A/B on the same machine + protocol:
                 AbsRel   delta_1
      MoGe-1     0.0305   0.9826
      MoGe-2     0.0305   0.9833
  Indistinguishable — under ANY scale+shift alignment (plain LSQ,
  ROE) the metric vs affine-invariant difference between v1 and
  v2 gets absorbed. MoGe-2's v1 improvement shows only with
  scale_alignment: none (metric eval) — see
  moge2-vitl-nyuv2-metric.

  Needs `pip install 'git+https://github.com/microsoft/MoGe.git'`.
