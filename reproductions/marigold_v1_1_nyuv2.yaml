# Marigold (v1-1) on NYUv2 Eigen test split
#
# First diffusion-depth reproduction in plumbline. Marigold is a
# Stable-Diffusion-v2-initialised UNet fine-tuned to produce affine-
# invariant depth maps — fundamentally different from the deterministic
# ViT adapters (DA-V2, DA3, MoGe, Metric3D). Tests whether the harness
# correctly handles stochastic / ensemble-averaged predictions.
#
# Paper target (Ke et al. 2024, "Repurposing Diffusion-Based Image
# Generators for Monocular Depth Estimation", Table 2 NYU row):
#     AbsRel  0.055
#     delta_1 0.964
#
# Paper protocol: num_inference_steps=4, ensemble_size=10, fp32 weights.
# We use fp16 by default for speed (~2x on a 3090); fp32 can be toggled
# in the YAML if exact paper-row matching is needed. Expect 2-5x slower
# wall time than DA-V2 due to the 4×10=40 UNet passes per sample.

name: marigold-v1-1-nyuv2
protocol: nyu_eigen_2014

model:
  name: marigold
  kwargs:
    variant: v1-1
    # Match prs-eth/Marigold's official eval for NYUv2
    # (script/depth/eval/11_infer_nyu.sh):
    # --denoise_steps 1 --ensemble_size 10 --seed 1234, no --fp16.
    # v1-1 is a 1-step distilled checkpoint; higher denoise_steps
    # change the prediction distribution. 2026-04-24: fixed to match
    # paper infer. Prior config (4 steps, fp16, seed 2024) matched an
    # informal ablation note, not the Table 1 cell the YAML pins.
    num_inference_steps: 1
    ensemble_size: 10
    dtype: float32
    seed: 1234

dataset:
  name: nyuv2

# Marigold outputs affine-invariant depth in [0, 1] — the paper
# protocol fits scale+shift in DEPTH space (gt ≈ s*pred + b), not the
# disparity-space fit DA-V2 / MoGe use. scale_shift_depth is the
# matching alignment mode.
scale_alignment: scale_shift_depth
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Marigold paper (Ke et al. 2024, arXiv:2312.02145), Table 1
  # (quantitative zero-shot comparison, NOT Table 2 — Table 2 is
  # training-noise ablation). NYUv2 AbsRel col, "Ours (w/ ensemble)"
  # row = 5.5 → 0.055. Audit 2026-04-20 corrected citation from
  # "Table 2" to "Table 1".
  value: 0.055
  tolerance_relative: 0.05
  citation: "Ke et al. 2024, Marigold (arXiv:2312.02145), Table 1 (Quantitative Comparison), NYUv2 AbsRel column, 'Ours (w/ ensemble)' row."
  source_confidence: verified_pdf

notes: >
  First GPU run (RTX 3090 Ti, 2026-04-19, 654-sample Eigen test,
  paper protocol 4 steps × 10 ensemble × fp16 × seed=2024,
  scale_shift_depth alignment):
      AbsRel   0.0577
      delta_1  0.9605
      RMSE     ~0.22 m

  Effective paper match (±5% off target 0.055). First attempt used
  plumbline's standard `scale_shift_robust` (fit in disparity space)
  and landed AbsRel 0.1645 — ~3x off — because Marigold's output
  is affine-invariant depth (values linear in depth, not disparity).
  Switching to scale_shift_depth (fit s*pred + b = gt_depth in
  depth space) recovered the match.

  Diffusion adapter infrastructure validated. Stochastic ensemble
  output reproduces cleanly when the seed is pinned (cached
  predictions hash key includes the seed).

  Needs `pip install diffusers` (bundled in the models extra).
  Wall time: ~28 min for 654 samples at paper protocol on 3090 Ti
  (4 × 10 × 0.13s UNet + VAE = ~2.5 s/sample, dominated by the
  ensemble averaging).
