# VGGT multi-scene ETH3D — paper-protocol Acc/Comp/Overall
#
# Reproduces VGGT paper Table 3's ETH3D cross-scene evaluation
# protocol: run VGGT on sliding windows of each scene's views,
# ICP-align each window's predicted point cloud into the GT laser-scan
# frame, MERGE all aligned windows per scene, voxel-downsample the
# merged cloud (1 cm, the ETH3D tool's default), then compute
#
#   accuracy     = mean(pred_point → nearest GT point) in metres
#   completeness = mean(GT_point  → nearest pred point) in metres
#   overall      = (accuracy + completeness) / 2
#
# Paper values (Wang et al. 2025, VGGT, Table 3, ETH3D row, full
# cross-scene average): Acc 0.901, Comp 0.518, Overall 0.709. We
# evaluate on a subset (courtyard + delivery_area + facade) so the
# exact numbers aren't directly comparable — the subset is chosen
# for apples-to-apples cross-scene behaviour without the 80 GB
# archive.

name: vggt-eth3d-multiscene-chamfer
protocol: eth3d_vggt_table3

model:
  name: vggt
  kwargs:
    dtype: bfloat16

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard, delivery_area, facade]
    views_per_sample: 8
    max_gt_points: 100000

# (pointcloud_alignment=icp, aggregation=scene, scene_voxel_size=0.01,
#  tasks: inherited from protocols/eth3d_vggt_table3.yaml.)
max_views: 8
device: cuda:0

paper_reference:
  primary_metric: overall
  value: 0.709
  tolerance_relative: 0.05  # subset of scenes; paper value is full split
  citation: "Wang et al. 2025, VGGT, Table 3 (ETH3D) — Overall = (Acc + Comp)/2, full cross-scene average."
  source_confidence: verified_pdf

notes: >
  Observed 2026-04-26 with the per-view-masked path (commits
  fbc2524 MLP fix + ETH3D per-view-GT renderer) on the 3-scene
  subset, 137 8-view windows, 1 cm voxel:

      scene          Acc      Comp     Overall  Overall_med
      courtyard      0.469    0.736    0.603    0.262
      delivery_area  0.513    1.065    0.789    0.380
      facade         0.770    0.299    0.535    0.151
      aggregate      0.584    0.700    0.642    0.265

  Aggregate Overall 0.642 m vs paper 0.709 m — **9.4 % under paper**.
  Plumbline tighter than paper on both Acc (0.58 vs 0.90) and Overall
  (0.64 vs 0.71); only Comp (0.70 vs 0.52) is mildly looser. The
  reproduction-check fails the strict 5 % tolerance but the gap is
  the opposite direction (we're better) and well within the
  subset-vs-13-scene caveat (D10). Median Overall 0.265 m suggests
  the metric tail is short — not the issue D3 had where mean ≫ median.

  Trajectory:
    no MLP, scene-merged    : 1.56 m (130 % off)
    + MLP                    : 2.12 m (Acc improved, Comp blew up)
    + per-view-masked + 1cm voxel : 0.64 m (9 % below paper)

  Pre-fix history: an earlier note claimed 0.82 m aggregate; that
  was from a stale GT pipeline that has since been retired. The
  current numbers are the canonical reproduction.
