# π³ (Pi3X) on ETH3D 3-scene subset — informational smoke run.
#
# Direct A/B with vggt-eth3d-multiscene-chamfer. Same scene subset
# (courtyard + delivery_area + facade), same protocol (ICP + scene-
# merge + 1 cm voxel), same aggregation (Acc/Comp/Overall in m).
#
# π³ paper (Yuan et al. 2025, arXiv:2507.13347) Table 3 reports
# ETH3D Accuracy 0.194 / Completion 0.210. VGGT's paper equivalent is
# 0.901 / 0.518 — a ~5x difference that likely reflects a different
# normalization OR scene-averaging convention. Leaving target
# UNPINNED until first observation clarifies.

name: pi3-eth3d-multiscene
protocol: eth3d_vggt_table3

model:
  name: pi3
  kwargs:
    variant: pi3x
    dtype: bfloat16

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard, delivery_area, facade]
    views_per_sample: 8
    max_gt_points: 100000

max_views: 8
device: cuda:0

paper_reference:
  primary_metric: overall
  value: null
  tolerance_relative: null
  citation: "Yuan et al. 2025, π³ (arXiv:2507.13347), Table 3. ETH3D Accuracy=0.194, Completion=0.210 — unit/subset convention vs plumbline's m-scale 3-scene chamfer not yet confirmed."
  source_confidence: null

notes: >
  First multi-view 3D-foundation-model A/B in plumbline. VGGT on the
  same 3-scene subset landed Overall=0.818 m vs paper 0.709 m on the
  full split. If π³'s result here is in a similar ballpark (sub-meter
  Overall), pinning against Table 3's 0.194/0.210 cells will need
  protocol-unit verification first.
