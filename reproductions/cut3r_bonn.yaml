# CUT3R VIDEO depth on Bonn RGB-D Dynamic — CUT3R Table 2 paper target.
#
# Targets CUT3R Table 2 "Video Depth Evaluation" (Wang et al. 2025,
# arXiv:2501.12387), Per-sequence scale block, BONN Abs Rel column,
# "Ours" row = 0.078 (companion δ<1.25 = 93.7). Verified by direct PDF
# read 2026-05-23 (PDF page 6).
#
# This is the first genuine VIDEO reproduction: one Sample == one Bonn
# sequence of N frames, run through CUT3R's recurrent state, with the
# runner fitting a single (per-sequence) median scale over the whole
# sample — exactly the "per-sequence scale" protocol Table 2 uses.
#
# STATUS — D24 RESOLVED 2026-05-25 (protocol delta, NOT a model bug):
# The observed 0.0536 reads *better* than paper 0.078 because the eval
# SET differs, not the model. CUT3R/MonST3R's Table 2 Bonn number uses 5
# specific sequences (balloon2, crowd2, crowd3, person_tracking2,
# synchronous) × 110 frames (rgb_110/depth_110), max_depth=70; this YAML
# evaluates all discovered sequences / 60 evenly-sampled frames / 64-view.
# plumbline's per-sequence-scale video pipeline is correct; the cell is a
# documented protocol/selection delta (`paper_match: no` is EXPECTED).
# See D24 in docs/DISCREPANCIES.md.

name: cut3r-bonn

model:
  name: cut3r
  kwargs:
    size: 512

dataset:
  name: bonn
  kwargs:
    num_frames: 60

tasks: [mono_depth]
# Per-sequence scale: the runner fits one median scale across all frames
# of a sample, and one Bonn Sample is one sequence (paper §4.1 / Table 2).
scale_alignment: median
max_views: 64
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.078
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, CUT3R (arXiv:2501.12387), Table 2 (Video Depth Evaluation), Per-sequence scale, BONN Abs Rel column, 'Ours' row = 0.078 (companion δ<1.25 = 93.7). Verified by direct PDF read 2026-05-23 (PDF page 6)."
  source_confidence: verified_pdf

notes: >
  Needs $CUT3R_ROOT + $CUT3R_CKPT (512-DPT) + $BONN_ROOT (extract the
  rgbd_bonn_<name>.zip archives from ipb.uni-bonn.de under it). Documented
  PROTOCOL/SELECTION DELTA, not a paper-match (D24): different sequence/
  frame selection than CUT3R's 5-seq × 110-frame Table 2 set, so the
  observed 0.0536 vs paper 0.078 is expected. Demonstrates the video task
  end-to-end; do not expect a ≤5 % match without matching the exact set.
