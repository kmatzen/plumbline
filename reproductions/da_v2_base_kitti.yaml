# Depth Anything V2 (small) on KITTI Eigen test split
#
# Outdoor counterpart to da-v2-small-nyuv2. KITTI Eigen is the default
# outdoor mono-depth benchmark: 652-image with-GT subset, evaluated
# against the KITTI Depth-Prediction Benchmark's annotated dense depth
# maps (Uhrig et al. 2017). The DA-V2 paper's Table 2 reports relative-
# depth ViT-B numbers for this protocol.

name: da-v2-base-kitti
protocol: kitti_eigen_garg

model:
  name: depth-anything-v2
  kwargs:
    variant: base

dataset:
  name: kitti
# DA-V2 predicts relative disparity — same MiDaS protocol as NYU.
scale_alignment: scale_shift
device: cuda:0
# KITTI standard eval cap (meters). Papers typically clip aligned
# predictions to this range before metric computation.
paper_reference:
  primary_metric: abs_rel
  # DA-V2 paper (Yang et al. 2024, arXiv:2406.09414), Table 2 "Zero-shot
  # relative depth estimation", KITTI column, ViT-B row.
  value: 0.078
  tolerance_relative: 0.10
  citation: "Yang et al. 2024, Depth Anything V2, Table 2 (zero-shot relative depth). KITTI, ViT-B."
  source_confidence: verified_pdf

notes: >
  Placeholder — observed recorded in follow-up commit.
