# D17 cross-check companion to `geowizard_nyuv2_d17probe_50step_sub60.yaml`:
# the production `geowizard_nyuv2.yaml` (10-step) on the same sub60
# spread. Lets us verify sub60 representativeness against the known
# 10-step full-set 0.0574 AbsRel before reading the 50-step number.
# Mirrors D9's "v1-1 / 1-step sub60" companion that cross-checked
# `marigold_v1_1_kitti.yaml`'s full-set 0.109.

name: geowizard-nyuv2-d17probe-10step-sub60
protocol: nyu_eigen_2014

model:
  name: geowizard
  kwargs:
    domain: indoor
    num_inference_steps: 10
    ensemble_size: 10
    processing_res: 768
    dtype: float32
    seed: 2024

subset: 60

scale_alignment: scale_shift_depth
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.052
  tolerance_relative: 0.05
  citation: "Fu et al. 2024, GeoWizard (arXiv:2403.12013), Table 1."
  source_confidence: verified_pdf

notes: >
  Diagnostic cross-check for D17 (not a paper-match cell). Reproduces
  plumbline's production 10-step config on a 60-image spread; the
  observed AbsRel should land near the known full-654 value 0.0574 to
  validate sub60 as a representative subset of the Eigen test split.
