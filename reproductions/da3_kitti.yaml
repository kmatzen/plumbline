# Depth Anything 3 (Large) on KITTI Eigen test split
#
# DA3 paper (arXiv:2511.10647) Table 4 reports δ₁ on KITTI = 0.953 (95.3) for
# the public DA3 release. δ₁ only — Table 4 reports no AbsRel for DA3. The paper
# gives no separate protocol; it defers to "the standard monocular depth
# benchmarks reported in [Depth Anything V2]", so we use kitti_eigen_garg +
# scale_shift — verified to reproduce DA-V2-Large's own KITTI δ₁ 0.946 (we get
# 0.9561) and AbsRel 0.074 on this exact protocol (2026-06-04 diagnostic).
#
# RESOLUTION: DA3's default 504 long-edge collapses KITTI's 3.3:1 frames to
# ~154 px tall and underperforms (δ₁ 0.9265, MISMATCH). At process_res=1008
# (308 px tall) the released DA3-LARGE-1.1 reproduces Table 4 exactly:
# δ₁ 0.9534 vs 0.953 (1080 Ti, 2026-06-04). NYU stays at 504 (near-square).
name: da3-kitti
protocol: kitti_eigen_garg
model:
  name: depth-anything-3
  kwargs:
    variant: large
    checkpoint: depth-anything/DA3-LARGE-1.1
    process_res: 1008  # KITTI needs more rows than the 504 default (see header)
dataset:
  name: kitti
scale_alignment: scale_shift
device: cuda:0
paper_reference:
  primary_metric: delta_1
  value: 0.953
  tolerance_relative: 0.02
  citation: "Bytedance Seed 2025, Depth Anything 3, Table 4. KITTI Eigen test, δ₁ (scale+shift aligned)."
  source_confidence: verified_pdf
notes: >
  DA3 vendored (_vendor/depth_anything_3; deps in base) — no install step.
  Target PDF-verified (arxiv.org/html/2511.10647 Table 4: DA3 KITTI 95.3,
  DA2 94.6). The gap at default 504 was a resolution artifact, not a checkpoint
  or protocol issue — process_res=1008 reproduces δ₁ 0.9534 vs 0.953 (MATCH).
