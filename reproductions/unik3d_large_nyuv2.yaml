# UniK3D (ViT-L) on NYUv2 Eigen test — metric depth, NO alignment
#
# UniK3D (Piccinelli et al., CVPR 2025, arXiv:2503.16591) is a universal
# monocular *metric* 3D estimator: from a single RGB it predicts metric depth
# (meters) and camera rays for any camera model, inferring its own intrinsics
# (no GT camera input). The adapter declares is_metric=True, so this cell runs
# with scale_alignment: none — the strict metric test the paper reports.
#
# Paper target: Appendix C.2, Table 18 ("Comparison on zero-shot evaluation for
# NYUv2"), UniK3D-Large row, metric columns (NOT the δ₁^SSI scale-shift column):
#   δ₁ 96.5 | A.Rel 7.4 | RMSE 0.259 | δ₁^SSI 98.2 | F_A 82.5 | ρ_A 91.2
# i.e. AbsRel 0.074, δ₁ 0.965, RMSE 0.259 m. The paper evaluates on the NYU
# Eigen crop with a 10 m cap and applies NO scale/shift (metric prediction).
#
# First UniK3D reproduction cell. The vendored inference subset prunes
# unik3d.ops.losses; build_losses now no-ops when it's absent so from_pretrained
# loads for inference (the loss dict is only read in the training path).

name: unik3d-large-nyuv2
protocol: nyu_eigen_2014

model:
  name: unik3d
  kwargs:
    variant: vitl

dataset:
  name: nyuv2

# Metric model — no scale/shift alignment (matches the paper's metric columns).
scale_alignment: none
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.074
  tolerance_relative: 0.05
  citation: "Piccinelli et al. 2025, UniK3D (CVPR 2025), Appendix C.2 Table 18 (zero-shot NYUv2), UniK3D-Large metric A.Rel 7.4 (no alignment); δ₁ 96.5, RMSE 0.259. PDF-verified arXiv:2503.16591 p.17."
  source_confidence: verified_pdf

notes: >
  ✅ MATCH (anima GTX 1080 Ti, fp32, 654/654, no alignment, 2026-06-11):
  AbsRel 0.0749 vs 0.074 (+1.2%); δ₁ 0.9656 vs 0.965 (≈exact); RMSE 0.2632 vs
  0.259 (+1.6%). Companions δ₂ 0.9917 / δ₃ 0.9959 / log10 0.0314 / silog 6.36.
  First UniK3D cell — reproduces the paper's metric NYUv2 number out of the box
  with UniK3D's default inference bounds (resolution_level unset). The vendored
  inference subset prunes unik3d.ops.losses; build_losses now no-ops when it is
  absent so from_pretrained loads (the loss dict is read only in the training
  path, never in infer).
