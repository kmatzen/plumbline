# GeoWizard NYU — D17 verification probe (50-step / 60-image subset).
#
# Hypothesis under test: D17's residual 10 % gap is the denoising-step
# count. The production `geowizard_nyuv2.yaml` mirrors upstream's
# argparse default (`--denoise_steps 10`), but `fuxiao0719/GeoWizard`'s
# README explicitly says "Default: 3 and 10 (For academic comparison,
# please set 10 and 50, respectively)" for `--ensemble_size` and
# `--denoise_steps`. Same shape as D9 (default-vs-paper drift between
# README guidance and script default in the diffusion-depth lineage).
#
# This probe is the cheap, decisive analog of D9's
# `v1p0_50step_sub60` run: every-11th of the 654 Eigen test images
# (60 samples, linspace stride via `subset: 60`), 50-step, fp32 +
# xformers + full `seed_all`. Expected wall time on a 3090 ≈ 2.3 h
# (5x the prior 10-step's ~0.28 s per image-step at processing_res
# 768 ensemble 10).
#
# Promotion path: if AbsRel lands ≤ 5 % from paper 0.052, update the
# production `geowizard_nyuv2.yaml` to `num_inference_steps: 50` and
# move D17 to RESOLVED. If not, write the residual evidence under D17
# and leave it upstream-blocked.

name: geowizard-nyuv2-d17probe-50step-sub60
protocol: nyu_eigen_2014

model:
  name: geowizard
  kwargs:
    domain: indoor
    num_inference_steps: 50   # README "For academic comparison, please set 10 and 50, respectively"
    ensemble_size: 10
    processing_res: 768
    dtype: float32
    seed: 2024

# linspace-stride subset of the protocol-fixed Eigen 654 test split.
# Same shape as D9's sub60: every-11th of 654 ≈ 60 images, decisive
# enough to confirm direction (D9 was 0.0992 sub60 vs 0.099 paper).
subset: 60

scale_alignment: scale_shift_depth
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.052
  tolerance_relative: 0.05
  citation: "Fu et al. 2024, GeoWizard (arXiv:2403.12013), Table 1, NYUv2 AbsRel column, 'GeoWizard (Ours)' row."
  source_confidence: verified_pdf

notes: >
  Diagnostic for D17 only — not a paper-match cell (60-image
  subset of the 654 Eigen test split). Mirrors D9's
  `marigold_kitti_v1p0_50step_sub60` shape: native-pipeline + native
  paper-protocol on a representative spread, used to decide whether
  the production YAML's `num_inference_steps` should move from 10 to
  50. Disposable; deletable once D17 is documented.
