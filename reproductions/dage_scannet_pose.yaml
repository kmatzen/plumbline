# DAGE video pose on ScanNet — DAGE Table 4 paper target.
#
# Targets DAGE Table 4 ("Camera pose evaluation"), ScanNet column, DAGE row:
# ATE 0.031 / RPE-trans 0.014 / RPE-rot 0.389 (arXiv:2603.03744, 2026).
#
# Same apparatus as `dage-sintel-pose` / `dage-tum-pose` (Sim(3)-aligned
# TUM-RGBD ATE/RPE via evo); only the dataset differs. DAGE's
# `evaluation/relpose/metadata.py` has `scannet: {seq_list: None, full_seq: True,
# traj_format: 'replica'}`, reusing MonST3R's `prepare_scannet.py` prep verbatim:
# first 90 frames at stride 3 (color_90/), poses concatenated to pose_90.txt
# (ScanNet camera-to-world). The `scannet-video-pose` loader reads that layout.
#
# DATA-BLOCKED: raw ScanNet is ToS-gated (http://www.scan-net.org/). MonST3R/DAGE
# use scenes scene0707_00..scene0806_00 (download_scannetv2.sh). Staging =
# download those .sens, extract color/pose, run prepare_scannet.py, point
# $SCANNET_VIDEO_ROOT at the result. Created GPU-free in the DAGE coverage pass
# (target verified vs PDF); unrunnable until the color_90/pose_90 layout exists.

name: dage-scannet-pose

model:
  name: dage
  kwargs:
    lr_max_size: 252
    # fp16 (Pascal-compatible). 90-frame clips are memory-heavy; if this OOMs on
    # 11 GB the runner skips the scene — rerun on a 24 GB card for full coverage.
    compute_dtype: float16

dataset:
  name: scannet-video-pose
  # Default = all staged scenes (MonST3R set: scene0707_00..scene0806_00).

tasks: [pose]
pose_trajectory_metrics: true
# ScanNet clips are up to 90 frames; max_views must be >= the trajectory length
# so predicted and GT trajectories have equal length.
max_views: 90
device: cuda:0

paper_reference:
  primary_metric: trajectory_ate_rmse
  value: 0.031
  tolerance_relative: 0.10
  citation: "Ngo et al. 2026, DAGE (arXiv:2603.03744), Table 4 (Camera pose evaluation), ScanNet column, DAGE row = ATE 0.031 / RPE-trans 0.014 / RPE-rot 0.389. Eval: TUM-RGBD-style ATE/RPE-RMSE under Sim(3) alignment over the scene0707_00..scene0806_00 set (first 90 frames at stride 3), via evo (align=True, correct_scale=True), built on the MonST3R relpose harness."
  source_confidence: verified_pdf

notes: >
  Companion DAGE-Table-4 numbers: RPE-trans 0.014, RPE-rot 0.389 (deg).
  DATA-BLOCKED on ToS-gated raw ScanNet staging (see header). Apparatus + loader
  are code-ready and unit-tested; the Sim(3) pose path is already proven by the
  ✅ `dage-sintel-pose` cell.
