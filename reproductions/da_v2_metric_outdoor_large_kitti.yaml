# Depth Anything V2 Metric Outdoor (Large) on KITTI Eigen test split
#
# Outdoor counterpart to da-v2-metric-indoor-large-nyuv2. This is the
# VKITTI-finetuned metric ViT-L checkpoint; unlike its indoor sibling
# it is trained on KITTI-shaped synthetic outdoor data, so it should be
# the natural match for KITTI eval.
#
# DA-V2 Table 4b reports KITTI AbsRel for the *KITTI-finetuned* ViT-L
# at 0.049 (in-domain). The HuggingFace port we load here is trained on
# VKITTI, not KITTI, so expect a ~0.05–0.08 range after median alignment
# rather than an exact paper match. Primary metric still reported so the
# runner can produce AbsRel cleanly.

name: da-v2-metric-outdoor-large-kitti
protocol: kitti_eigen_garg

model:
  name: depth-anything-v2
  kwargs:
    variant: metric-outdoor-large

dataset:
  name: kitti
# The checkpoint predicts depth in meters directly. A paper match against
# an in-domain (KITTI-finetuned) ViT-L would require no alignment, but
# the VKITTI-trained port carries a domain bias similar to what the
# Hypersim-trained indoor checkpoint shows on NYU. Median-align per
# sample and treat as informational until the first GPU run lands.
scale_alignment: median
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # No directly-published number for the *VKITTI-finetuned* ViT-L on
  # KITTI; the paper's KITTI 0.049 is for a *KITTI-finetuned* ViT-L
  # (Table 4b). Keeping tolerance permissive until the first run.
  tolerance_relative: 1.0
  citation: "No direct paper reference for VKITTI-finetuned ViT-L on KITTI (DA-V2 Table 4b targets the KITTI-finetuned variant)."

notes: >
  ℹ️ Informational result (2026-04-20, RTX 3090 Ti, 652 Eigen benchmark,
  Garg crop, median scale alignment per sample):

      abs_rel   delta_1   delta_2   rmse    log10
      0.0877    0.9138    0.9837    3.269   0.0366

  No direct paper target (the VKITTI-finetuned ViT-L isn't the
  checkpoint reported in DA-V2 Table 4b's KITTI 0.049 — that was the
  KITTI-finetuned ViT-L). VKITTI domain shift shows up as ~14%
  higher AbsRel than the KITTI-finetuned paper number. For
  paper-match outdoor: use da-v2-small-kitti (relative,
  scale_shift-aligned, matches at 0.0770) or metric3d-v2-kitti
  (metric, matches at 0.0495).
