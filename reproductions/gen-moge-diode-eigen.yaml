# MoGe under the DIODE-indoor eigen recipe (cross-protocol). Mirrors the
# da-v2-*-diode-indoor configs (domain indoors + sample_ids_file, no diode_dav2
# protocol which pins domain=both). MoGe is moge-eval-native (DIODE 0.0407).
name: gen-moge-diode-eigen
model:
  name: moge
  kwargs:
    variant: vitl
dataset:
  name: diode
  split: val
  kwargs:
    domain: indoors
sample_ids_file: diode_val_indoor.samples.txt
min_samples: 220
tasks:
  - mono_depth
scale_alignment: scale_shift
max_views: 1
device: cuda:0
depth_clip: [0.001, 50.0]
paper_reference:
  primary_metric: abs_rel
  value: null
  tolerance_relative: 0.05
  citation: "Backlog cross-protocol: MoGe under eigen-2014 on DIODE-indoor; moge-eval-native (0.0407), no eigen paper target."
  source_confidence: informational_no_paper
notes: "Cross-protocol backlog (MoGe x DIODE, eigen-2014 indoor recipe)."
