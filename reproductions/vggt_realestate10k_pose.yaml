# VGGT N-view pose on RealEstate10K — VGGT Table 1 paper-match.
#
# Targets VGGT Table 1 (Wang et al. 2025, arXiv:2503.11651), "Re10K (unseen)"
# column, "Ours (Feed-Forward)" row, AUC@30 = 0.853. Same PoseDiffusion
# protocol as the CO3Dv2 pose cell. New DATASET coverage on the pose axis.

name: vggt-realestate10k-pose
protocol: realestate10k_pose

model:
  name: vggt
  kwargs: {}

dataset:
  name: realestate10k-pose-eval
  kwargs:
    num_frames: 10
    seed: 0
    # clips: null   # set to the canonical 1.8K RealEstate10K test split
    #               # (DUSt3R/PoseDiffusion) to match the paper subset exactly

tasks: [pose]
scale_alignment: none
pointcloud_alignment: none
max_views: 10
device: cuda:0

pose_translation_antipodal: true
pose_auc_mode: vggt_co3d_histogram
pose_auc_thresholds: [3.0, 5.0, 15.0, 30.0]
pose_acc_thresholds: [5.0, 15.0]

paper_reference:
  primary_metric: pairwise_pose_auc@30
  value: 0.853
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, VGGT (arXiv:2503.11651), Table 1, 'Re10K (unseen)' column, 'Ours (Feed-Forward)' row = 85.3 → AUC@30 0.853. Verified by ar5iv PDF read 2026-05-28 (the CO3Dv2 88.2 in the same row confirms the right cell)."
  source_confidence: verified_pdf

notes: >
  ⚠️ RAN on RTX 3090 (2026-06-07, bf16, 50/50): AUC@30 0.7184 vs paper 0.853
  (-15.7%, MISMATCH at tol 5%). Rotation is NEAR-PERFECT (pairwise_RRA@15 1.000,
  rot_err 1.24°) — the geometry/pose convention (unknown #3) is correct, NOT a
  w2c/c2w mixup. The whole gap is TRANSLATION (trans_cos_err 11.1°, RTA@5 0.508),
  which is exactly what a SUBSET mismatch (unknown #2) produces: this ran on a
  50-clip YouTube-scraped subset (`scripts/stage_realestate10k.py`, 93% hit,
  seed 0), NOT VGGT's canonical 1.8K Re10K test split. Translation-AUC on
  indoor Re10K is highly subset-sensitive (clip difficulty/baseline varies), so
  a 50-clip availability-biased sample plausibly accounts for ~16%. To close:
  stage the canonical 1.8K split and pass it via `clips:`. Left ⚠️ (subset gap,
  not an adapter bug). Companion: rotation reproduces cleanly.
  ---
  History: new RealEstate10K dataset coverage on the pose axis via the
  `realestate10k-pose-eval` loader (mirrors the CO3Dv2 pose loader). Frames are
  scraped from YouTube (many source videos offline) to $REALESTATE10K_ROOT as
  <clip_id>/{*.txt,<timestamp>.jpg}. Aggregation caveat as the CO3Dv2 pose cell
  (per-sample vs per-group AUC, ~1-2%).
