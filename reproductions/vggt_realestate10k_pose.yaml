# VGGT N-view pose on RealEstate10K — VGGT Table 1 paper-match.
#
# Targets VGGT Table 1 (Wang et al. 2025, arXiv:2503.11651), "Re10K (unseen)"
# column, "Ours (Feed-Forward)" row, AUC@30 = 0.853. Same PoseDiffusion
# protocol as the CO3Dv2 pose cell. New DATASET coverage on the pose axis.

name: vggt-realestate10k-pose
protocol: realestate10k_pose

model:
  name: vggt
  kwargs: {}

dataset:
  name: realestate10k-pose-eval
  kwargs:
    num_frames: 10
    seed: 0
    # clips: null   # set to the canonical 1.8K RealEstate10K test split
    #               # (DUSt3R/PoseDiffusion) to match the paper subset exactly

tasks: [pose]
scale_alignment: none
pointcloud_alignment: none
max_views: 10
device: cuda:0

pose_translation_antipodal: true
pose_auc_mode: vggt_co3d_histogram
pose_auc_thresholds: [3.0, 5.0, 15.0, 30.0]
pose_acc_thresholds: [5.0, 15.0]

paper_reference:
  primary_metric: pairwise_pose_auc@30
  value: 0.853
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, VGGT (arXiv:2503.11651), Table 1, 'Re10K (unseen)' column, 'Ours (Feed-Forward)' row = 85.3 → AUC@30 0.853. Verified by ar5iv PDF read 2026-05-28 (the CO3Dv2 88.2 in the same row confirms the right cell)."
  source_confidence: verified_pdf

notes: >
  ⚠️ RAN at 1.8K scale on RTX 3090 (2026-06-07, bf16, 1800/1800): AUC@30 0.7288
  vs paper 0.853 (-14.6%, MISMATCH at tol 5%). **The subset-variance hypothesis
  is DISPROVEN**: scaling 50→1800 clips moved AUC@30 only +1% (0.7184→0.7288),
  not toward 0.853. The gap is REAL and STABLE, and entirely TRANSLATION:
  rotation is near-perfect at both scales (pairwise_RRA@15 0.998, rot_err 1.20°
  → geometry/pose convention correct, NOT a w2c/c2w mixup), while trans_cos_err
  is dead-stable at ~10.8° (RTA@5 0.514). Translation-direction error this size,
  invariant to sample count, points at a DATA-FIDELITY gap in the scrape recipe,
  NOT a VGGT adapter bug: `scripts/stage_realestate10k.py` pulls ≤480p YouTube
  RE-ENCODES and samples 16 EVENLY-SPACED frames across the full multi-second
  clip → low-res features + very wide baselines, both of which degrade
  translation precision specifically (rotation is robust to it). PoseDiffusion's
  eval uses native RE10K frames + its own (tighter) sampling. To close, the
  scrape would need native-res frames and the paper's frame-window protocol;
  left ⚠️ (data-fidelity gap, NOT an implementation bug — see cross-check).
  ---
  IMPLEMENTATION CROSS-CHECK (rules out an adapter/harness bug): every code path
  here is shared with a PASSING cell except the RE10K data. (1) The SAME VGGT
  adapter + SAME `vggt_co3d_histogram` AUC + SAME `pose_translation_antipodal`
  reproduces CO3Dv2 AUC@30 0.8964 vs 0.882 (REPRODUCTIONS.md) — CO3Dv2's AUC
  fully exercises translation on native-res data, so the predicted-pose
  translation extraction is validated. (2) The SAME loader `invert_pose`/rebase
  + metric reproduces DUSt3R-CO3Dv2 0.789 vs 0.772 (PR #17) — a `[Rᵀ|−t]`
  translation-inversion bug would have broken both CO3Dv2 cells. (3) RE10K's own
  GT parse is sound: rotation is perfect (RRA@15 0.998) and R,t come from the
  same 12-float `.txt` block. Conclusion: code validated; the gap is the ≤480p
  wide-baseline scrape vs the paper's native frames.
  ---
  History: 50-clip run first gave AUC@30 0.7184 (same shape); the 1.8K re-scrape
  + run was to test subset variance (ruled out). New RealEstate10K dataset
  coverage on the pose axis via the `realestate10k-pose-eval` loader (mirrors the
  CO3Dv2 pose loader). Frames scraped from YouTube (many source videos offline,
  92% hit) to $REALESTATE10K_ROOT as <clip_id>/{*.txt,<timestamp>.jpg}.
  Aggregation caveat as the CO3Dv2 pose cell (per-sample vs per-group, ~1-2%).
