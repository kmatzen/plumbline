# VGGT N-view pose on RealEstate10K — VGGT Table 1 paper-match.
#
# Targets VGGT Table 1 (Wang et al. 2025, arXiv:2503.11651), "Re10K (unseen)"
# column, "Ours (Feed-Forward)" row, AUC@30 = 0.853. Same PoseDiffusion
# protocol as the CO3Dv2 pose cell. New DATASET coverage on the pose axis.

name: vggt-realestate10k-pose
protocol: realestate10k_pose

model:
  name: vggt
  kwargs: {}

dataset:
  name: realestate10k-pose-eval
  kwargs:
    num_frames: 10
    seed: 0
    # clips: null   # set to the canonical 1.8K RealEstate10K test split
    #               # (DUSt3R/PoseDiffusion) to match the paper subset exactly

tasks: [pose]
scale_alignment: none
pointcloud_alignment: none
max_views: 10
device: cuda:0

pose_translation_antipodal: true
pose_auc_mode: vggt_co3d_histogram
pose_auc_thresholds: [3.0, 5.0, 15.0, 30.0]
pose_acc_thresholds: [5.0, 15.0]

paper_reference:
  primary_metric: pairwise_pose_auc@30
  value: 0.853
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, VGGT (arXiv:2503.11651), Table 1, 'Re10K (unseen)' column, 'Ours (Feed-Forward)' row = 85.3 → AUC@30 0.853. Verified by ar5iv PDF read 2026-05-28 (the CO3Dv2 88.2 in the same row confirms the right cell)."
  source_confidence: verified_pdf

notes: >
  ⚠️ RAN at 1.8K scale on RTX 3090 (2026-06-07, bf16, 1800/1800): AUC@30 0.7288
  vs paper 0.853 (-14.6%, MISMATCH at tol 5%). Subset variance DISPROVEN (50→1800
  moved it only +1%). Gap is stable + entirely TRANSLATION (rot near-perfect
  RRA@15 0.998 / 1.20°; trans_cos ~10.8° stable).
  ---
  CROSS-MODEL CONTROL (2026-06-08, GTX 1080 Ti, IDENTICAL 50-clip subset
  `re10k_sub50` = first-50-sorted; the decisive test). Same loader+metric+data,
  three models:
    MASt3R  AUC@30 0.8452  (target 0.764, +11% — EXCEEDS, trans_cos 7.6°)
    DUSt3R  AUC@30 0.6556  (target 0.612,  +7% — EXCEEDS, trans_cos 14.8°)
    VGGT    AUC@30 0.6724  (target 0.853, -21% — MISSES, trans_cos 13.6°, fp32)
  **This OVERTURNS the earlier "data-fidelity" conclusion.** Both optimization-
  based models CLEAR their RE10K targets on the exact same ≤480p scraped clips,
  so the data is NOT a blanket limiter. The published ranking
  (VGGT 0.853 > MASt3R 0.764 > DUSt3R 0.612) INVERTS on our data (MASt3R top,
  VGGT bottom) — VGGT is the lone outlier. The gap is therefore VGGT-SPECIFIC ON
  RE10K, not generic data and not a found adapter bug (VGGT-CO3Dv2 0.8964 ✓,
  preprocessing mirrors upstream mode=crop, GT/metric validated by the two
  passing models here). LEADING HYPOTHESES (open): (a) VGGT feed-forward
  translation is far more sensitive to the scrape's ≤480p + wide 16-evenly-
  spaced-frame baselines than MASt3R/DUSt3R's 500-iter global optimization, which
  refines against correspondences and recovers; (b) a VGGT × wide-aspect
  interaction (RE10K 16:9 → 518×294 vs CO3Dv2's ~518×518) — NOT excluded. Next
  test to disambiguate: re-scrape a few clips with DENSE frames and re-run VGGT
  with tight baselines (would isolate (a)).
  ---
  CO3Dv2 cross-check (still valid, rules out a GLOBAL adapter/harness bug): SAME
  VGGT adapter + AUC mode + antipodal handling reproduces CO3Dv2 0.8964 vs 0.882;
  SAME loader invert_pose/metric reproduces DUSt3R-CO3Dv2 0.789 vs 0.772 (a
  `[Rᵀ|−t]` inversion bug would have broken both); RE10K rotation perfect
  validates its GT parse. So the code is right in general — the failure is the
  VGGT×RE10K-recipe interaction above.
  ---
  History: 50-clip run first gave AUC@30 0.7184 (same shape); the 1.8K re-scrape
  + run was to test subset variance (ruled out). New RealEstate10K dataset
  coverage on the pose axis via the `realestate10k-pose-eval` loader (mirrors the
  CO3Dv2 pose loader). Frames scraped from YouTube (many source videos offline,
  92% hit) to $REALESTATE10K_ROOT as <clip_id>/{*.txt,<timestamp>.jpg}.
  Aggregation caveat as the CO3Dv2 pose cell (per-sample vs per-group, ~1-2%).
