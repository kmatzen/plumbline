# Depth Anything V2 (small) on NYUv2 Eigen test split
#
# First plumbline reproduction to match a published paper number end-to-end.
# Runs on CPU or Apple Silicon MPS in ~4 minutes.

name: da-v2-small-nyuv2

model:
  name: depth-anything-v2
  kwargs:
    variant: small

dataset:
  name: nyuv2
  split: test
  kwargs:
    apply_eigen_crop: true

tasks:
  - mono_depth

# DA-V2 predicts relative disparity; the MiDaS protocol fits scale + shift
# in inverse-depth space. That's what `scale_shift` does under the hood.
scale_alignment: scale_shift
max_views: 1
device: cuda:0
# Eigen 2014 NYU protocol: clip aligned depth to the same range as the valid GT
# mask so outlier alignments don't dominate the mean AbsRel.
depth_clip: [0.001, 10.0]

paper_reference:
  primary_metric: abs_rel
  # DA-V2 paper (Yang et al. 2024), Table 2: NYU AbsRel for the zero-shot
  # relative ViT-S is reported at 0.053. This holds when evaluated against
  # NYU's rawDepths field (Eigen 2014 protocol). Earlier plumbline runs
  # used the colorization-filled `depths` field and saw ~0.062; switching
  # the NYUv2 loader's default to `depth_field="raw"` closed the gap.
  value: 0.053
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2, Table 2. NYUv2 Eigen test, ViT-S (relative)."

notes: >
  Paper-match anchor for the end-to-end mono-depth pipeline. Drifting more
  than ±5% from ~0.051 means something regressed in alignment / Eigen-crop
  / depth-field / HF checkpoint handling — investigate before touching
  anything else. Earlier versions of this file cited 0.063 and reported a
  "match" against that number; the 0.063 wasn't a paper value, and the
  filled-depth eval gave 0.062 — both symptoms of running against the
  wrong depth field. rawDepths-default landed 2026-04-18.
