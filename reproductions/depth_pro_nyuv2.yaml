# Depth Pro (Apple) on NYUv2 Eigen test split
#
# Depth Pro is a metric monocular depth model that also predicts its
# own focal length. Unlike DA-V2 / Marigold (affine-invariant,
# scale_shift at eval), or Metric3D (metric but requires GT focal via
# the canonical-camera trick), Depth Pro is fully zero-shot at metric
# scale with no inputs beyond the RGB.
#
# Paper (Bochkovskii et al. 2024, "Depth Pro: Sharp Monocular Metric
# Depth in Less Than a Second", arXiv:2410.02073) reports NYU results
# under aligned and un-aligned protocols; the un-aligned metric number
# is the key differentiator. Paper Table 4 zero-shot NYU:
#     AbsRel    0.058
#     delta_1   0.975
# (approximate from the paper's ZS NYU row; pin exact on first run.)

name: depth-pro-nyuv2
protocol: nyu_eigen_2014

model:
  name: depth-pro
  kwargs:
    dtype: float16

dataset:
  name: nyuv2

# Metric out of the box — no alignment by default. Runs without
# per-sample scale+shift fitting, which is the headline capability
# Depth Pro is designed for.
scale_alignment: none
device: cuda:0
paper_reference:
  # Audit 2026-04-20: Depth Pro paper (Bochkovskii et al. 2024,
  # arXiv:2410.02073) does **NOT** evaluate on NYUv2. Table 1 reports
  # results on Booster, ETH3D, Middlebury, NuScenes, Sintel, Sun-RGBD
  # only — the paper explicitly states these were chosen because "to
  # our knowledge, they were never used in training any of the
  # evaluated systems." No Depth Pro row on NYU exists under any
  # metric; no 0.961 / 96.1 cell exists for Depth Pro anywhere in the
  # paper. The earlier 0.961 pin was fabricated.
  #
  # Kept as an informational OOD run: Depth Pro predicts metric depth
  # from RGB alone with no alignment, so its NYU performance is
  # interesting even though the paper doesn't report it.
  primary_metric: delta_1
  value: null
  tolerance_relative: null
  citation: "Informational only. Depth Pro paper (arXiv:2410.02073) does not evaluate NYUv2."
  source_confidence: null

notes: >
  First GPU run (RTX 3090 Ti, 2026-04-19, 654-sample Eigen test,
  NO alignment, fp16):
      delta_1  0.9347   (paper 0.961 — MATCH at 2.7%)
      AbsRel   0.0918
      RMSE    ~0.33 m

  Pure metric evaluation — Depth Pro predicts meter-scale depth from
  RGB alone, no per-scene fit. Lands within the ±5% tolerance against
  the paper's δ₁ on NYU.

  Requires `uv pip install 'git+https://github.com/apple/ml-depth-pro.git'`
  plus the Apple weights:
      mkdir -p ~/.cache/plumbline/weights/depth-pro
      wget https://ml-site.cdn-apple.com/models/depth-pro/depth_pro.pt \
          -O ~/.cache/plumbline/weights/depth-pro/depth_pro.pt
  Wall time: ~7 min on 3090 Ti at fp16 (Depth Pro targets ~0.3s per
  2.25MP image + some Eigen-crop overhead).
