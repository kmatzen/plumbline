# DA3 chamfer / F-score on ETH3D courtyard
#
# DA3 counterpart to vggt-eth3d-courtyard-chamfer. Exercises the same
# point-cloud metric path (dense point map → camera-centres Umeyama →
# chamfer vs scan_clean GT) on a second multi-view model family, which
# also confirms the alignment path is not VGGT-specific.

name: da3-eth3d-courtyard-chamfer

model:
  name: depth-anything-3
  kwargs:
    variant: large

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard]
    views_per_sample: 8
    max_gt_points: 100000

tasks:
  - mvs_depth

pointcloud_alignment: icp
max_views: 8
device: cuda:0

paper_reference:
  primary_metric: chamfer
  tolerance_relative: 1.0
  citation: "DA3 Large-1.1, ETH3D courtyard sweep — informational."

notes: >
  CORRECTED ON 2026-04-19 — earlier commit (001f3b8) misread the
  f_score output (values are in PERCENT; 0.61 = 0.61%, not 61%).
  The actual ICP numbers put DA3 roughly similar to VGGT on the
  same slice:

                      VGGT    DA3
      chamfer         6.84    7.14
      F-score@5cm    0.67%   0.61%
      precision      0.69%   0.84%
      recall         0.82%   0.77%

  CORRECTED AGAIN ON 2026-04-20 — the "paper reports ETH3D F-scores
  in the 60-90% range" comparison above was fabricated. Neither the
  DA3 nor the VGGT paper reports F-score on ETH3D; VGGT Table 3 is
  distance-metric (Acc 0.901, Comp 0.518, Overall 0.709 m, lower is
  better). F@5cm is an indoor T&T threshold that doesn't fit
  outdoor ETH3D; these per-window sub-1% numbers aren't comparable
  to anything in the paper.

  Paper-protocol ETH3D reproduction: see vggt-eth3d-multiscene-
  chamfer (aggregation: scene, Overall metric in metres). DA3 would
  need its own multi-scene yaml to get a paper-comparable number.

  Added value of this yaml even with the corrected numbers:
  validates the runner's depth→point-map back-projection fallback.
  DA3 doesn't return a dense point_map directly; without the
  fallback (added alongside), chamfer here would be NaN. Also
  useful as a per-window A/B against VGGT on the same slice.
