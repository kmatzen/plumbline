# DA3 chamfer / F-score on ETH3D courtyard
#
# DA3 counterpart to vggt-eth3d-courtyard-chamfer. Exercises the same
# point-cloud metric path (dense point map → camera-centres Umeyama →
# chamfer vs scan_clean GT) on a second multi-view model family, which
# also confirms the alignment path is not VGGT-specific.

name: da3-eth3d-courtyard-chamfer

model:
  name: depth-anything-3
  kwargs:
    variant: large

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard]
    views_per_sample: 8
    max_gt_points: 100000

tasks:
  - mvs_depth

pointcloud_alignment: camera_centers
max_views: 8
device: cuda:0

paper_reference:
  primary_metric: chamfer
  tolerance_relative: 1.0
  citation: "DA3 Large-1.1, ETH3D courtyard sweep — informational."

notes: >
  First GPU run (RTX 3090 Ti, 2026-04-19, 31 sliding 8-view windows):
  chamfer=7.99, F-score@0.05=0.12%, precision=0.09%, recall=0.25%.
  Compare with VGGT on the same slice: chamfer=7.71, F-score=0.12%.
  The two models land within 4% of each other on chamfer despite
  quite different architectures — strong evidence that the ~8m
  chamfer is a PROTOCOL effect (camera-centres Umeyama alignment
  doesn't match the paper's ICP-on-point-clouds protocol) rather
  than model-specific.

  Added value of this A/B: DA3 doesn't return a dense point_map
  directly (only depth + K + E), so this run also validated the
  runner's back-projection fallback added alongside. Before that
  fallback, chamfer was NaN here and reproducible-only on VGGT.
  Now any adapter providing depth+intrinsics+extrinsics gets
  chamfer for free.

  v0.2 work: add an ICP alignment mode so absolute chamfer numbers
  approach the paper tables.
