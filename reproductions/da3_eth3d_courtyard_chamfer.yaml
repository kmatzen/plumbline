# DA3 chamfer / F-score on ETH3D courtyard
#
# DA3 counterpart to vggt-eth3d-courtyard-chamfer. Exercises the same
# point-cloud metric path (dense point map → camera-centres Umeyama →
# chamfer vs scan_clean GT) on a second multi-view model family, which
# also confirms the alignment path is not VGGT-specific.

name: da3-eth3d-courtyard-chamfer

model:
  name: depth-anything-3
  kwargs:
    variant: large

dataset:
  name: eth3d
  split: train
  kwargs:
    scenes: [courtyard]
    views_per_sample: 8
    max_gt_points: 100000

tasks:
  - mvs_depth

pointcloud_alignment: icp
max_views: 8
device: cuda:0

paper_reference:
  primary_metric: chamfer
  tolerance_relative: 1.0
  citation: "DA3 Large-1.1, ETH3D courtyard sweep — informational."

notes: >
  Observed values (RTX 3090 Ti, 2026-04-19, 31 sliding 8-view
  windows, ICP alignment):
      chamfer       7.14
      F-score@0.05  61.17%
      precision     84.13%
      recall        76.83%

  Direct A/B with VGGT on the same slice (both with ICP):
                      VGGT     DA3
      chamfer         6.84     7.14
      F-score@5cm    66.95%   61.17%
      precision      68.76%   84.13%   ← DA3 higher (conservative)
      recall         81.59%   76.83%   ← VGGT higher (aggressive)

  Interpretation: DA3 is more conservative — its predictions are
  more accurate when present (precision up ~15 pts) but cover less
  GT surface (recall down ~5 pts). VGGT produces denser predictions
  that include more hallucinations. Net F-score lower for DA3
  because the harmonic mean penalises the lower recall more than it
  rewards the higher precision.

  Both models work end-to-end under ICP; confirms the protocol is
  the dominant factor (not the model) on this benchmark.

  Earlier camera_centers-alignment values on the same predictions
  (pre-ICP): chamfer=7.99, F=0.12%, precision=0.09%, recall=0.25% —
  F-score improved 490x under ICP. That jump surfaced the fix;
  without the DA3 A/B, ICP's gains on VGGT alone could have been
  attributed to some VGGT-specific quirk.
