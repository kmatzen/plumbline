# Depth Pro on Sintel — metric δ₁ (Depth Pro Table 1).
#
# Depth Pro's FIRST paper-match candidate (it does NOT evaluate NYU/KITTI;
# its Table 1 "zero-shot metric depth accuracy" reports Booster / ETH3D /
# Middlebury / NuScenes / Sintel / Sun-RGBD). Sintel is the cleanest of
# those for plumbline: the `sintel` loader's .dpt GT is already in METERS,
# and Depth Pro outputs metric meters (is_metric=True) — so this is a
# direct metric comparison with NO scale alignment (the eval Depth Pro
# was designed for). New MODEL coverage (Depth Pro had 0 ✅).
#
# Created GPU-free in the 2026-05-28 coverage pass; this is a queued
# EXPERIMENT, not yet a claim — see the protocol caveats below.

name: depth-pro-sintel
# Metric δ₁ on native Sintel; shares sky mask / pass with sintel_dav2 except
# alignment (none — Depth Pro outputs metric meters).
protocol: sintel_depth_pro_metric

model:
  name: depth-pro
  kwargs: {}

scale_alignment: none
device: cuda:0

paper_reference:
  primary_metric: delta_1
  value: 0.400
  tolerance_relative: 0.05
  citation: "Bochkovskii et al. 2024, Depth Pro (arXiv:2410.02073), Table 1 (zero-shot metric depth accuracy), Depth Pro row, Sintel column: δ₁ = 0.400 (40.0%). Metric — NO scale alignment. Verified by PDF read 2026-05-28 (the agent confirmed this; note Depth Pro does NOT eval NYU/KITTI, where a prior pin (0.961 NYU) was fabricated)."
  source_confidence: verified_pdf

notes: >
  Next-box EXPERIMENT (2026-05-28 coverage pass) — Depth Pro's first
  paper-match candidate / NEW model coverage. Two protocol unknowns to
  Appendix C Table 16 protocol (`sintel_depth_pro_metric`). Full run 2026-05-31:
  δ₁ **0.2409** vs paper **0.400** (MISMATCH). 80-frame smoke ~0.48. Upstream
  README: public weights re-trained. Needs `plumbline install
  depth-pro` + the depth_pro.pt weights (manual download to
  ~/.cache/plumbline/weights/depth-pro/; see the adapter docstring).
  BLOCKED — docs/blocked/DEPTH_PRO_SINTEL_TABLE1.md. ETH3D Table 1:
  docs/ETH3D_DEPTH_PRO_TABLE1_HANDOFF.md (not blocked; data pending).
