# Depth Anything V2 — Sintel shakedown run
#
# Not a paper-number reproduction: this is the smallest end-to-end smoke
# test. DA-V2 is relative, Sintel is tiny, and the MiDaS scale-and-shift
# protocol gives a stable number.

name: depth-anything-v2-sintel
protocol: sintel_dav2

model:
  name: depth-anything-v2
  kwargs:
    variant: large
    input_size: 518

scale_alignment: scale_shift
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.487
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 (zero-shot relative depth estimation), Sintel column, ViT-L row: AbsRel = 0.487. Pass/sky cap pinned to MonST3R lineage (final, max_depth 70 m) pending DA-V2 appendix confirmation. Verified by PDF read 2026-05-28."
  source_confidence: verified_pdf

notes: >
  Native Sintel under protocol sintel_dav2 (sky mask at 70 m). Prior run
  without max_depth blew up AbsRel (sky ~1e5 m). MoGe-bundle cell
  da-v2-large-sintel-moge (0.214) is a different table/protocol.
