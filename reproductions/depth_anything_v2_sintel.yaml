# Depth Anything V2 — Sintel shakedown run
#
# Not a paper-number reproduction: this is the smallest end-to-end smoke
# test. DA-V2 is relative, Sintel is tiny, and the MiDaS scale-and-shift
# protocol gives a stable number.

name: depth-anything-v2-sintel

model:
  name: depth-anything-v2
  kwargs:
    variant: "large"
    input_size: 518

dataset:
  name: sintel
  split: training
  kwargs:
    pass_name: final
    views_per_sample: 1

tasks:
  - mono_depth

scale_alignment: scale_shift
max_views: 1
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # Audit 2026-04-20: the previous 0.075 pin was fabricated. DA-V2
  # Table 2 (Yang et al. 2024, arXiv:2406.09414) reports ViT-L Sintel
  # AbsRel = 0.487 under its own zero-shot protocol — which is over 6×
  # the 0.075 value this YAML previously claimed. The paper does not
  # specify exactly which Sintel pass (clean/final/albedo) or which
  # scale alignment mode, so a paper-match reproduction requires first
  # reading the DA-V2 paper's "Section B. Benchmarks" for the protocol.
  # Until that's pinned, this YAML stays a smoke test — not a
  # paper-match.
  value: null
  tolerance_relative: null
  citation: "Informational smoke test. DA-V2 Table 2 reports ViT-L Sintel AbsRel=0.487 (protocol not fully specified); not reproduced here."
  source_confidence: null

notes: >
  Use this as the CPU-free pipeline shakedown: small HF checkpoint + small
  dataset. No metric-scale assumptions — run with scale_shift alignment.
