# MoGe-1 (ViT-L) on DIODE val-indoor
#
# Companion to moge-vitl-nyuv2 — same adapter + scale_shift protocol
# on a different dataset. DA-V2 indoor AbsRel on DIODE-indoor was
# 0.0722 on this machine; MoGe-1 should land roughly similar.
#
# Paper target: MoGe paper Table 3 reports ViT-L DIODE AbsRel=0.0400,
# but that's on the COMBINED val split. This YAML runs indoor-only;
# domain=both is in moge-vitl-diode-both.

name: moge-vitl-diode-indoor
protocol: diode_moge

model:
  name: moge
  kwargs:
    variant: vitl

dataset:
  name: diode
  kwargs:
    domain: indoors

sample_ids_file: diode_val_indoor.samples.txt

scale_alignment: scale_shift_robust
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # MoGe paper (Wang et al. 2024, arXiv:2410.19115), Table 3 "Depth
  # Map Estimation" (NOT Table 2 — Table 2 is point-map). DIODE column,
  # "affine-invariant disparity" row (the fit-in-inverse-depth
  # protocol plumbline's scale_shift / scale_shift_robust uses):
  #     Reld = 4.00 → AbsRel 0.0400, δ₁ = 97.3
  # The "affine-invariant depth" row gives Reld=3.13 / δ₁=97.6 — that's
  # the fit-in-depth-space protocol which plumbline doesn't currently
  # wire; claiming 0.0313 as the target was a citation error.
  # Audit 2026-04-20 corrected citation from "Table 2" to "Table 3".
  value: 0.0400
  tolerance_relative: 0.20
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 (Depth Map Est.), DIODE column, affine-invariant disparity row, ViT-L (combined val 771 samples — this YAML runs indoor-only, see notes)."
  source_confidence: verified_pdf

notes: >
  ROE run (RTX 3090 Ti, 2026-04-19, 325 indoor samples,
  scale_shift_robust):
      AbsRel   0.0465
      delta_1  0.9505
  Plain LSQ scale_shift baseline on same predictions: AbsRel 0.0584.
  ROE closed 20% of the gap.

  Paper target (combined val, 771 samples, ROE): 0.0313. Remaining
  ~49% gap after ROE is most likely indoor-harder-than-outdoor —
  the paper's combined-val mean benefits from the 446 outdoor
  samples. A domain=both run on the same MoGe predictions would
  settle whether the residual is dataset-slice or something else.

  Beats DA-V2 small on the same DIODE-indoor slice (0.0722);
  roughly matches DA-V2 on unified metric (DA-V2's observed 0.0722
  vs paper 0.073).

  Needs `pip install 'git+https://github.com/microsoft/MoGe.git'`.
