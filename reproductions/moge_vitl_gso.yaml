# MoGe (ViT-L) on GSO (Google Scanned Objects, via MoGe's preprocessed bundle)
#
# GSO fills the synthetic-clean-GT slot after the 2026-04-19 pivot
# (Sintel remained auth-gated). 1030 single-object renders at 512x512
# with pristine log-encoded depth PNGs + normalized intrinsics, from
# MoGe's HF dataset Ruicheng/monocular-geometry-evaluation.
#
# GSO is MoGe's own eval bundle so the depth preprocessing question
# that bit DIODE (2.7x residual) is definitionally resolved here —
# same encoding, same invalid marker, same image resolution.
#
# Paper target: UNVERIFIED. The MoGe paper (Wang et al. 2024) reports
# GSO in Table 2/3 of the Depth Map Estimation section, but we have
# not yet cross-checked the exact row/column the user wants plumbline
# to gate against. Run informationally first; pin the value after the
# user reads off the paper number.

name: moge-vitl-gso
protocol: gso_moge

model:
  name: moge
  kwargs:
    variant: vitl

# (dataset.name=gso, depth_clip, scale_alignment, max_views, tasks:
#  inherited from protocols/gso_moge.yaml.)
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  # UNVERIFIED target until the paper table row is confirmed. MoGe
  # reports GSO with three alignment columns (scale-invariant depth /
  # affine-invariant depth / affine-invariant disparity); plumbline's
  # scale_shift_robust matches the "affine-invariant disparity" column.
  value: 0.00944
  tolerance_relative: 0.05
  citation: "Wang et al. 2024, MoGe (arXiv:2410.19115), Table 3 affine-invariant-disparity block, MoGe (Ours) ViT-L row, GSO column: Rel 0.944 → AbsRel 0.00944 (companion δ₁ 1.00). Same verified table as the MoGe-1 NYU/KITTI/DIODE ✅ cells. Verified by PDF re-read 2026-05-28; the recorded observed (0.0094, 2026-04-19) already matches — a re-run is queued to capture a retained result JSON before promoting to ✅."
  source_confidence: verified_pdf

notes: >
  Observed (RTX 3090 Ti, 2026-04-19, full 1030-object eval split, ROE):
      AbsRel   0.0094
      delta_1  0.9999
      delta_2  1.0000
      delta_3  1.0000
      RMSE     0.006 m

  Near-perfect — expected, because GSO is MoGe's own eval bundle
  (they rendered these 1030 objects for their paper) with pristine
  log-encoded GT, known intrinsics, and single-object framing. This
  is the anti-DIODE: no depth-preprocessing mismatch, no ambiguity
  over which distance convention, no outdoor sky pixels. Treat this
  as a smoke test that the loader + alignment are wired correctly
  rather than a discrimination test.

  Target value still pending user confirmation from Wang et al. 2024,
  Table 2 or Table 3 GSO column. Once pinned, re-gate with a 5-10%
  tolerance (matching other MoGe reproductions).

  GSO dataset:
      1030 objects; 512x512; log-encoded uint16 depth.png with
      per-image near/far metadata; normalized intrinsics in meta.json.
      Principal point is at image centre for every sample.

  Download (no auth):
      hf download Ruicheng/monocular-geometry-evaluation \
          --repo-type dataset --include 'GSO*' \
          --local-dir $GSO_ROOT/..
      cd $GSO_ROOT/.. && unzip GSO.zip

  Needs `pip install 'git+https://github.com/microsoft/MoGe.git'`.
