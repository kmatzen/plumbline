# MASt3R N-view pose on CO3Dv2 — MASt3R Table 3 paper-match
#
# Targets MASt3R Table 3 (Leroy et al. 2024, arXiv:2406.09756), CO3Dv2
# column block, MASt3R row: RRA@15 = 0.946, RTA@15 = 0.919,
# **mAA(30) = 0.818** (= AUC@30 in plumbline's metric naming; MASt3R
# paper §4.3 says mAA30 = "area under the accuracy curve ... at
# min(RRA@30, RTA@30)" = max(R°, t-cos°) AUC).
#
# Verified by DIRECT PDF READ 2026-05-23 (resolves D23 — the arXiv HTML
# render only ever served the appendix). Table 3 is titled "Multi-view
# pose regression on the CO3Dv2 and RealEstate10K with 10 random
# frames"; MASt3R is row (b) pairwise. CO3Dv2: RRA@15 94.6 / RTA@15
# 91.9 / mAA(30) 81.8. (RealEstate10K mAA(30) 76.4, not used here.)
#
# Protocol per MASt3R §4.3: "Following [100]" (= PoseDiffusion) — 41
# categories from CO3Dv2, each sequence 10 frames, relative pose
# between all 45 pairs, NOT using ground-truth focals. MASt3R + DUSt3R
# repos don't ship a CO3Dv2 pose eval; VGGT's `evaluation/test_co3d.py`
# is the only public impl of this protocol.

name: mast3r-co3dv2-pose
protocol: co3dv2_vggt_pose

model:
  name: mast3r
  kwargs:
    # PointCloudOptimizer hyperparams (paper §4.3 / DUSt3R defaults).
    # ga_niter: 300, ga_lr: 0.01, ga_schedule: linear, ga_init: mst.
    {}

dataset:
  name: co3dv2-vggt-pose-eval
  kwargs:
    num_frames: 10
    min_num_images: 50
    min_quality: 0.5
    fast_eval: true
    sequences_per_category: 10
    seed: 0

tasks: [pose]
scale_alignment: none
pointcloud_alignment: none
max_views: 10
device: cuda:0

pose_translation_antipodal: true
pose_auc_mode: vggt_co3d_histogram
pose_auc_thresholds: [3.0, 5.0, 15.0, 30.0]
# RRA@15 = 0.946, RTA@15 = 0.919 — both reported in the same paper row.
pose_acc_thresholds: [5.0, 15.0]

paper_reference:
  primary_metric: pairwise_pose_auc@30
  value: 0.818
  tolerance_relative: 0.05
  citation: "Leroy et al. 2024, MASt3R (arXiv:2406.09756), Table 3 (Multi-view pose regression on CO3Dv2 / RealEstate10K, 10 random frames), CO3Dv2 column block, row (b) pairwise → MASt3R: mAA(30) = 81.8 → AUC@30 0.818. Companion cells (same row): RRA@15 = 94.6 → 0.946, RTA@15 = 91.9 → 0.919. Verified by direct PDF read 2026-05-23 (D23 resolved)."
  source_confidence: verified_pdf

notes: >
  First multi-view paper-match attempt for MASt3R.

  Adapter dispatch: at N=10 views the MASt3R adapter switches from
  PairViewer (2-view feed-forward) to dust3r's PointCloudOptimizer
  (iterative global alignment, init='mst', niter=300, lr=0.01,
  schedule='linear'). This is the path MASt3R paper §4.3 specifies:
  "MASt3R's predictions are post-processed via DUSt3R's global
  alignment". Expected per-sample wall time ~20 s on a 3090, so
  410 samples ≈ 2.5 h.

  UPDATE 2026-06-02 — the v0.3 follow-up below is DONE. The adapter now
  defaults to pose_backend='sparse_ga' (MASt3R's own matching-based
  sparse_global_alignment), so this cell's `kwargs: {}` now runs the FAITHFUL
  path — not the dust3r_ga path the historical ✅ 0.796 was measured on.
  Controlled A/B on a 30-sample 6-cat subset: dust3r_ga 0.835 vs sparse_ga
  0.858 (only +2.3 pts — CO3Dv2's narrow baselines barely exercise matching;
  cf. RE10K's +17.6 pts, where the old path collapsed to a DUSt3R near-tie).
  So the cell SURVIVES the method change (sparse_ga ≥ dust3r_ga, both above
  0.818 on this easy subset); the exact full-410 sparse_ga number is pending a
  roomier/curope GPU. Until then, read the 0.796 ✅ as measured on the legacy
  dust3r_ga backend. (Original v0.3 note: swap dust3r's PointCloudOptimizer for
  mast3r.cloud_opt.sparse_global_alignment — MASt3R's own optimizer.)

  Same loader path as vggt-co3dv2-pose; same caveat about per-category
  aggregation. Needs $CO3DV2_ROOT and $MAST3R_ROOT (with dust3r
  submodule) on disk.
