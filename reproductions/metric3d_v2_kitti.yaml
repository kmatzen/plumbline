# Metric3Dv2 (ViT-L) on KITTI Eigen test split
#
# Zero-shot metric depth on the outdoor benchmark. KITTI is one of the
# datasets Metric3Dv2's Table I reports zero-shot numbers on, alongside
# NYU. The model's canonical-camera trick recovers metric scale from
# each frame's focal length, so no scale alignment is applied.

name: metric3d-v2-kitti
protocol: kitti_eigen_garg

model:
  name: metric3d-v2
  kwargs:
    variant: vit_large

dataset:
  name: kitti
# Metric model — no scale alignment.
scale_alignment: none
device: cuda:0
paper_reference:
  primary_metric: abs_rel
  # Metric3Dv2 paper (Yin et al. 2024, arXiv:2404.15506), Table I, KITTI
  # zero-shot row, ViT-L CSTM_label.
  value: 0.052
  tolerance_relative: 0.10
  citation: "Yin et al. 2024, Metric3D v2, Table I. KITTI Eigen test, ViT-L CSTM_label ZS."
  source_confidence: verified_pdf

notes: >
  ✅ MATCH (2026-04-20, RTX 3090 Ti, 652 Eigen benchmark frames with
  Uhrig 2017 annotated GT, Garg crop, no scale alignment — metric):

      abs_rel   delta_1   delta_2   rmse    log10
      0.0495    0.9785    0.9962    2.262   0.0214

  Paper target 0.052 — observed 0.0495 is 4.8% below (within ±10%).
  Metric3Dv2's canonical-camera trick recovers metric scale from the
  focal length, so no scale_alignment is applied.

  Same upstream-install caveats as metric3d-v2-nyuv2 (mmengine +
  mmcv-lite; xformers must be ABI-matched or absent).
