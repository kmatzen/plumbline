# CUT3R VIDEO depth on Bonn — exact-set + Weiszfeld scale (Table 2).
#
# Targets CUT3R Table 2 "Video Depth Evaluation" (Wang et al. 2025,
# arXiv:2501.12387), Per-sequence scale, BONN "Ours" row = 0.078
# (δ<1.25 = 93.7; verified_pdf 2026-05-23, PDF page 6).
#
# The third CUT3R cell, after the NYU + KITTI per-frame ✓s. Bonn is CUT3R's
# VIDEO eval (one Sample = one sequence, ONE scale fit over the whole clip),
# and — unlike NYU/KITTI which use ratio-of-medians — Bonn uses CUT3R's
# `eval/video_depth --align scale` = a robust scale-only Weiszfeld IRLS fit
# (`align_with_scale=True`). plumbline's new `scale_weiszfeld` mode ports it.
#
# Exact set: the 5 Table-2 sequences (balloon2, crowd2, crowd3,
# person_tracking2, synchronous) × first 110 frames, max_depth=70.
#
# RESULT — ℹ️ OFF-PAPER / UNRESOLVED (ran 2026-06-16 on anima, 5/5 seqs):
# Unlike the per-frame NYU/KITTI ✓s, Bonn does NOT reproduce, and the cause is
# the VIDEO path, not the alignment:
#   - first-110 (faithful rgb_110) + scale_weiszfeld: AbsRel **0.41577** (paper
#     0.078) — and median 0.4287 / median_lineage 0.4061 too, i.e. ~0.42 under
#     ALL alignments, every sequence bad (0.22–0.77).
#   - even-subsampled 110 frames: ~0.060 under all alignments (off-paper-better).
# So alignment is NOT the gap (scale_weiszfeld is still the correct CUT3R video
# `--align scale` port). CUT3R's recurrent predictions on first-110 CONTIGUOUS
# frames are catastrophic via plumbline's video path while even-subsampled is
# fine — the OPPOSITE of what a coherent recurrent model should do. Two
# candidate causes, not yet separated:
#   (a) plumbline's CUT3R VIDEO/recurrent inference diverges from CUT3R's
#       eval/video_depth pipeline (the per-frame path is byte-verified; the
#       multi-frame recurrent path is NOT), or
#   (b) CUT3R's `rgb_110` (MonST3R prepare_bonn.py) is constructed differently
#       than first-110-of-associations, so this isn't the exact set.
# DECISIVE NEXT STEP (deferred): run CUT3R's own eval/video_depth on this staged
# data — 0.078 → (a) plumbline video bug; ~0.42 → (b) data/frame-set mismatch.
# Kept on the faithful first-110 config so the cell EXPOSES the gap honestly
# rather than hiding behind even-subsample's nicer 0.060. NOT a paper-match.
#
# Data: stage the 5 per-sequence zips (public, no account) via
# scripts/stage_bonn_cut3r.sh into $BONN_ROOT.

name: cut3r-bonn-110

model:
  name: cut3r
  kwargs:
    size: 512

dataset:
  name: bonn
  kwargs:
    sequences: [balloon2, crowd2, crowd3, person_tracking2, synchronous]
    num_frames: 110
    frame_selection: first   # CUT3R's rgb_110 = first 110 contiguous frames
    max_depth: 70.0

tasks: [mono_depth]
# Per-sequence scale (one Sample = one sequence) via CUT3R's video --align scale
# = robust scale-only Weiszfeld IRLS, NOT median.
scale_alignment: scale_weiszfeld
max_views: 110
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.078
  tolerance_relative: 0.05
  citation: "Wang et al. 2025, CUT3R (arXiv:2501.12387), Table 2 (Video Depth Evaluation), Per-sequence scale, BONN Abs Rel column, 'Ours' row = 0.078 (companion δ<1.25 = 93.7). Verified by direct PDF read 2026-05-23 (PDF page 6)."
  source_confidence: verified_pdf

notes: >
  CUT3R Table 2 Bonn video cell. Exact 5-seq × 110-frame set + `scale_weiszfeld`
  (CUT3R's video --align scale). Distinct from `cut3r-bonn` (all-seqs / 60-frame,
  median, off-paper 0.0536). Needs $BONN_ROOT (5 rgbd_bonn_<name>/ dirs) +
  $CUT3R_ROOT + $CUT3R_CKPT (curope optional — pytorch RoPE fallback works).
