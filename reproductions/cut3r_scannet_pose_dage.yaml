# CUT3R video pose on ScanNet — DAGE Table 4 *baseline* target.
#
# DAGE Table 4 ("Camera pose evaluation"), ScanNet column, CUT3R row:
# ATE 0.094 / RPE-trans 0.022 / RPE-rot 0.629 (Ngo et al. 2026, arXiv:2603.03744).
# Same Sim(3)-aligned TUM-RGBD ATE/RPE protocol as dage-scannet-pose; only the
# model differs. CUT3R is feed-forward/online, so 90-frame clips fit 11 GB.
#
# DATA-BLOCKED: needs the MonST3R-preprocessed ScanNet color_90/pose_90 layout
# (ToS-gated raw ScanNet — see dage_scannet_pose.yaml header). The ScanNet analog
# of the ✅ `cut3r-sintel-pose-dage` cell.

name: cut3r-scannet-pose-dage

model:
  name: cut3r
  kwargs:
    size: 512

dataset:
  name: scannet-video-pose

tasks: [pose]
pose_trajectory_metrics: true
max_views: 90
device: cuda:0

paper_reference:
  primary_metric: trajectory_ate_rmse
  value: 0.094
  tolerance_relative: 0.10
  citation: "Ngo et al. 2026, DAGE (arXiv:2603.03744), Table 4 (Camera pose evaluation), ScanNet column, CUT3R row = ATE 0.094 / RPE-trans 0.022 / RPE-rot 0.629. TUM-RGBD-style ATE/RPE-RMSE under Sim(3) alignment over scene0707_00..scene0806_00 (first 90 frames at stride 3), via evo, built on the MonST3R relpose harness."
  source_confidence: verified_pdf

notes: >
  Reproduces a *baseline* (CUT3R) row from the DAGE paper. Companion
  DAGE-Table-4 CUT3R numbers: RPE-trans 0.022, RPE-rot 0.629 (deg). Cross-measurement
  (DAGE measuring CUT3R vs plumbline measuring CUT3R) — if outside ±10 % it stays
  informational, as with the ✅ `cut3r-sintel-pose-dage` cell. DATA-BLOCKED on
  ToS-gated raw ScanNet staging. Requires the CUT3R clone at $CUT3R_ROOT + its
  512-DPT checkpoint + a built curope CUDA ext.
