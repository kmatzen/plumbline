# Depth Anything V2 (small) on ETH3D — DA-V2's OWN Table 2.
#
# ViT-S companion to da-v2-large-eth3d-native. DA-V2 Table 2 ETH3D AbsRel
# 0.142 (verified_pdf 2026-05-28).

name: da-v2-small-eth3d-native
protocol: eth3d_dav2

model:
  name: depth-anything-v2
  kwargs:
    variant: small
    input_size: 518

scale_alignment: scale_shift
device: cuda:0

paper_reference:
  primary_metric: abs_rel
  value: 0.142
  tolerance_relative: 0.05
  citation: "Yang et al. 2024, Depth Anything V2 (arXiv:2406.09414), Table 2 (zero-shot relative depth estimation), ETH3D column, ViT-S row: AbsRel = 0.142. Verified by NeurIPS 2024 PDF read 2026-05-28."
  source_confidence: verified_pdf

notes: >
  Native ETH3D via protocols/eth3d_dav2 (per-view GT render + scale_shift).
  Distinct from da-v2-large-eth3d-moge (MoGe bundle, 0.0473). Needs full
  ETH3D high-res train scenes at $ETH3D_ROOT (13 scenes for paper apples-to-
  apples; 3-scene subset on S3 is a smoke subset only).
