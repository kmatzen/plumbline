# SUN RGB-D test split — Depth Pro Table 1 metric δ₁.
#
# Appendix Table 16: 5050 samples, valid 0.001–10 m, ~530×730 GT.

name: sun_rgbd_depth_pro_metric
description: >
  SUN RGB-D test split: metric δ₁, no alignment (Depth Pro Table 1).

reference:
  paper: "Bochkovskii et al. 2024, Depth Pro Table 1 / appendix Table 16 (Sun-RGBD)"

fixed:
  dataset:
    name: sun-rgbd
    split: test
  depth_clip: [0.001, 10.0]
  mask_boundaries: false
  max_views: 1
  tasks: [mono_depth]
