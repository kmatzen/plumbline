# ETH3D high-res native — UniK3D zero-shot metric depth (UniK3D Table 21).
#
# UniK3D (Piccinelli et al., CVPR 2025) reports zero-shot METRIC depth on
# ETH3D in supplementary Table 21 (the pinhole ETH3D, NOT the ETH3D_Dist
# fisheye Table 25). UniK3D's own ETH3D dataset class
# (unik3d/datasets/eth3d.py) uses min_depth=0.01, max_depth=50.0 and the
# 13 high-res *train* scenes (test_split="train.txt") — the only ETH3D split
# that ships GT depth. We mirror that range here: GT outside [0.01, 50] m is
# masked, and predictions are clipped to the same range before scoring.
#
# This differs from the sibling Depth Pro protocol (eth3d_depth_pro_metric),
# which caps at 200 m per Depth Pro's appendix Table 16. Same loader
# (eth3d-native-depth: distorted DSLR RGB + ETH3D's official rendered float32
# depth at native resolution), different cap.

name: eth3d_unik3d_metric
description: >
  ETH3D native official-depth mono-depth: metric (no alignment), GT and
  prediction capped at [0.01, 50] m to match UniK3D's ETH3D dataset class
  (UniK3D supplementary Table 21).

reference:
  paper: "Piccinelli et al. 2025, UniK3D (CVPR 2025), supplementary Table 21 (ETH3D)"

fixed:
  dataset:
    name: eth3d-native-depth
    split: train
    kwargs:
      depth_range: [0.01, 50.0]
  depth_clip: [0.01, 50.0]
  mask_boundaries: false
  max_views: 1
  tasks: [mono_depth]
