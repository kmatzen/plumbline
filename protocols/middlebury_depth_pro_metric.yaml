# Middlebury MiddEval3 training — Depth Pro Table 1 metric δ₁.
#
# Appendix Table 16: 15 samples, valid 0.001–10 m, full resolution (F).

name: middlebury_depth_pro_metric
description: >
  MiddEval3 training (15 scenes, F): metric δ₁, no alignment.

reference:
  paper: "Bochkovskii et al. 2024, Depth Pro Table 1 / appendix Table 16 (Middlebury)"

fixed:
  dataset:
    name: middlebury
    split: training
    kwargs:
      resolution: f
      use_nocc_mask: true
  depth_clip: [0.001, 10.0]
  mask_boundaries: false
  max_views: 1
  tasks: [mono_depth]
