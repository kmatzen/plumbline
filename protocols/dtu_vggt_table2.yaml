# DTU MVS evaluation — VGGT Table 2 protocol.
#
# VGGT Table 2 "Dense MVS on DTU" reports chamfer (Acc / Comp / Overall)
# on the standard 22-scan MVSNet test subset. Protocol:
#
# - 22 test scans (DTU_MVS_TEST_SCANS in src/plumbline/datasets/dtu.py).
# - 8 views per sample at the canonical DTU rectified resolution.
# - Lighting condition L=3 (canonical MVSNet eval).
# - GT point cloud is per-scan ``stl<NNN>_total.ply`` from DTU's
#   official Points archive (~6.97 GB), restricted to test-scan IDs.
# - The plumbline loader subsamples the GT cloud to ``max_gt_points``
#   (default 200 000) for tractable chamfer; this does not change the
#   value materially vs the full ~1-10 M points per scan.
# - Pred-to-GT alignment uses ICP within the world-from-camera-0
#   frame (the DTU loader's convention).
# - Chamfer in millimetres (DTU's native unit).
#
# Paper target: Overall = 0.382 (Acc 0.389, Comp 0.374). plumbline's
# v0.1 acceptance criterion is reproducing this within ±5 % under
# scale_alignment=none (VGGT is metric-trained).

name: dtu_vggt_table2
description: >
  DTU 22-scan MVSNet test set, 8-view samples at light=3, ICP align
  to GT point cloud, chamfer in mm. v0.1 paper-match gate
  (Overall=0.382 ±5 %).

reference:
  paper: "Wang et al. 2025, VGGT (arXiv:2503.11651), Table 2 (Dense MVS on DTU)"
  test_scans: "DTU_MVS_TEST_SCANS in src/plumbline/datasets/dtu.py (22 scans)"
  alignment: "ICP within world-from-camera-0 frame; GT clouds in mm"

# Fixed by this protocol:
fixed:
  dataset:
    name: dtu
    split: test
    kwargs:
      # ONE sample per scan covering the full 49-view ring. Matches
      # CUT3R's ``eval/mv_recon/data.py::DTU._get_views`` with
      # ``kf_every=1`` and ``full_video=True`` — accumulate per-view
      # masked clouds across all rig views into a single chamfer per
      # scan, NOT a sliding window of small N-view tuples (the latter
      # produces 42x duplication and times out on commodity GPUs).
      # max_views below trims to VGGT's 32-view inference cap; the
      # rendered GT covers all 49 views regardless.
      views_per_sample: 49
      light: 3
      # Render per-view GT depth + valid mask by z-buffering the laser
      # PLY through each view's GT camera (matches MVSNet's preprocessing
      # of the same ground-truth surface). Required by the per-view-
      # masked chamfer path below.
      with_per_view_gt: true
  scale_alignment: none
  pointcloud_alignment: icp
  # Per-view-masked chamfer (CUT3R/MASt3R/VGGT-family DTU eval). For
  # each view: pred and GT pts3d are taken at the model's processed
  # resolution, center-cropped to 224×224, restricted to per-pixel GT
  # validity, then accumulated per scene. Scene-merge does ICP align +
  # KDTree NN both directions on the masked clouds. Reference:
  # ``CUT3R/eval/mv_recon/launch.py`` lines ~195-260 +
  # ``utils.py::accuracy/completion``. See ``docs/DISCREPANCIES.md`` D3
  # for the structural-mismatch history.
  aggregation: scene
  per_view_masked: true
  per_view_crop: 224
  # Geometric-consistency post-processing — PatchmatchNet ``eval.py``
  # ``check_geometric_consistency`` + multi-source aggregation.
  # MASt3R §4.5 cites this as ref [99] ("we remove spurious 3D points
  # via geometric consistency post-processing"); VGGT §4.2 inherits via
  # "Following MASt3R". Pre-filter that drops ref-view pixels that don't
  # reproject consistently into ≥ ``geo_mask_thres`` source views (px
  # error < ``geo_pixel_thres``, relative depth diff < ``geo_depth_thres``).
  # Thresholds match PatchmatchNet ``eval.sh`` DTU defaults; only
  # ``photo_thres`` is dropped (VGGT's depth_conf is unbounded — would
  # need separate calibration). Source views per ref are top-K by
  # predicted-camera-centre distance (PatchmatchNet uses pair.txt's
  # visual-overlap ranking; equivalent for DTU's dense ring rig).
  geometric_consistency: true
  geo_pixel_thres: 1.0
  geo_depth_thres: 0.01
  geo_mask_thres: 3
  geo_num_src_views: 4
  # scene_voxel_size is unused on the per-view-masked path (no inner
  # voxel_downsample); kept here so a future demote to the
  # legacy scene-merged path remains a one-line YAML edit.
  # No per-chunk voxel downsample on the per-view-masked DTU path —
  # 1 mm voxel collapses pred (in pred-frame ≈ metres) when gt is in
  # mm, since the voxel size is interpreted in the cloud's native
  # frame. Per-sample camera-centres Umeyama before voxel can fix
  # this but didn't improve over the voxel-free path on a 22-scan
  # sweep (0.85 vs 0.76 m Overall). DTU clouds are tractable without
  # the voxel (~800 K masked points / scan total).
  scene_voxel_size: 0
  # 32 views is the verified baseline (8592db9: 0.758 m Overall on
  # 22 scans). 2026-04-26 sweep with all 49 views gave 0.85 m — no
  # improvement. The adapter cap was bumped to 49 in case future
  # protocols can use more, but DTU stays at 32.
  max_views: 32
  tasks: [mvs_depth, pose]
