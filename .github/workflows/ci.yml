name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:  # manual "Run workflow" — lets the site deploy after secrets land

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Run tests
        run: uv run pytest -q

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - run: uv python install 3.12
      - run: uv sync --python 3.12
      - run: uv run mypy src

  # Deploy the marketing site (Cloudflare Worker) on every green push to main.
  # Idempotent: re-uploads the Worker from site/index.html + site/styles.css and
  # re-attaches plumbline-bench.org. Keeps Basic Auth (the BASIC_AUTH_PASS secret
  # binding); to make it public, run scripts/deploy_site_preview.py --no-auth once.
  # Requires repo secrets CLOUDFLARE_API_TOKEN ("Edit Cloudflare Workers" scope)
  # and PREVIEW_PASS (the visitor Basic Auth password). If they're absent the job
  # warns and no-ops, so it never reds main before the secrets are configured.
  deploy-site:
    needs: [lint-and-test, typecheck]
    # push to main, or a manual workflow_dispatch on main — never on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Deploy site Worker (Cloudflare)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_PASS: ${{ secrets.PREVIEW_PASS }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping site deploy. Add CLOUDFLARE_API_TOKEN + PREVIEW_PASS under Settings → Secrets and variables → Actions."
            exit 0
          fi
          uv run --no-project --python 3.12 --with requests \
            python scripts/deploy_site_preview.py --domain plumbline-bench.org
