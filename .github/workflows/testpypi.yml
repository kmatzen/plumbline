name: testpypi-dryrun

# Throwaway workflow to validate trusted publishing (PyPI OIDC) against TestPyPI
# BEFORE the real release. It is **manual-only** (workflow_dispatch, no tag
# triggers) so it can never race the real `wheels.yml` publish on a `v*` tag.
#
# One-time setup on test.pypi.org (Account -> Publishing -> add a *pending*
# publisher): Project `plumbline-bench`, Owner `kmatzen`, Repo `plumbline`,
# Workflow `testpypi.yml`, Environment `testpypi`. Also create a `testpypi`
# GitHub environment (Settings -> Environments).
#
# To run: Actions -> "testpypi-dryrun" -> Run workflow. Confirm the OIDC
# handshake + upload succeed, then DELETE this file (it has served its purpose).

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      # TestPyPI rejects re-uploading an existing version, so stamp a unique
      # PEP 440 dev version per run — keeps this dry-run idempotent/re-runnable
      # without touching the committed 0.2.0. (Anchored on `^version = ` so it
      # only hits the [project] version, not ruff's target-version etc.)
      - name: Stamp a per-run dev version
        run: |
          sed -i -E 's/^version = ".*"/version = "0.2.0.dev${{ github.run_number }}"/' pyproject.toml
          grep -E '^version = ' pyproject.toml

      - name: Build sdist + wheel
        run: uv build

      - name: Verify wheel metadata
        run: uv run --with twine twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist-testpypi
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/plumbline-bench
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-testpypi
          path: dist

      - name: Publish to TestPyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          print-hash: true
